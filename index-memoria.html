<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD MEMORY 6x6</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #ui-layer { position: absolute; z-index: 10; text-align: center; }
        .panel { background: rgba(0,0,0,0.9); border: 2px solid #34c1ea; padding: 20px; border-radius: 15px; }
        button { margin: 10px; padding: 15px 25px; cursor: pointer; background: #16a34a; border: none; color: white; font-weight: bold; border-radius: 8px; }
        #bienvenida-img { width: 300px; height: 300px; background-size: cover; margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="ui-layer">
    <div id="pantalla-inicio" class="panel">
        <div id="bienvenida-img" style="background-image: url('https://ipfs.io/ipfs/bafybeiefhnawny7nlgixveiia7aaougqxsird6or4nws52vp36ndbfvixa')"></div>
        <h1>BIENVENIDO A ZAARD</h1>
        <p>Prueba tu memoria y gana recompensas.</p>
        <button onclick="showMenu()">ACEPTAR RETO</button>
    </div>
    
    <div id="menu-juego" class="panel" style="display:none;">
        <div style="width: 200px; height: 200px; background: url('https://ipfs.io/ipfs/bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm') center/cover;"></div>
        <h2>SELECCIONA MODO</h2>
        <button onclick="iniciarJuego(false)">INVITADO</button>
        <button onclick="iniciarJuego(true)">CONECTAR WEB3</button>
    </div>
</div>

<script>
    function showMenu() { document.getElementById('pantalla-inicio').style.display = 'none'; document.getElementById('menu-juego').style.display = 'block'; }

    const cids = [
        "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a",
        "bafkreic6hmavutykpcpviuxv4pq3xkgcquznb5j4zw7zbsrmwp5jnhylcy",
        "bafkreigufyxj7u4z7dgdkkghqbwyykmbtzp4ysxa7vau5a7at4bix4qmca",
        "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli",
        "bafkreia3b625wibxbftpcbdjqwqjnuthccdr2nrl6t3oflfne7w4dcqmaq",
        "bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4",
        "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue",
        "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq",
        "bafkreihtzxh5dazi4c3vueo5glxbycstfdesswsus73c4uwah5xwunyowa",
        "bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm"
    ];

    function iniciarJuego(web3) {
        document.getElementById('ui-layer').style.display = 'none';
        new Phaser.Game({
            type: Phaser.AUTO, width: 800, height: 800,
            scene: {
                preload: function() {
                    cids.forEach((cid, i) => this.load.image('c'+i, 'https://ipfs.io/ipfs/' + cid));
                    this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                },
                create: function() {
                    // Fondo espacial simple
                    this.add.rectangle(400, 400, 800, 800, 0x020006);
                    this.intentos = 6;
                    this.txt = this.add.text(20, 20, 'Oportunidades: 6', { fontSize: '32px', fill: '#34c1ea' });
                    
                    let deck = []; for(let i=0; i<18; i++) { deck.push(i%10, i%10); }
                    Phaser.Utils.Array.Shuffle(deck);

                    deck.forEach((id, i) => {
                        let card = this.add.sprite(100 + (i % 6) * 120, 150 + Math.floor(i / 6) * 120, 'dorso').setScale(0.15).setInteractive();
                        card.cid = 'c'+id;
                        card.on('pointerdown', () => {
                            if(this.lock || card.texture.key !== 'dorso') return;
                            card.setTexture(card.cid);
                            if(!this.p1) this.p1 = card;
                            else {
                                this.lock = true;
                                if(this.p1.cid !== card.cid) {
                                    setTimeout(() => {
                                        this.p1.setTexture('dorso'); card.setTexture('dorso');
                                        this.p1 = null; this.lock = false;
                                        this.intentos--; this.txt.setText('Oportunidades: ' + this.intentos);
                                        if(this.intentos <= 0) location.reload();
                                    }, 800);
                                } else { this.p1 = null; this.lock = false; }
                            }
                        });
                    });
                }
            }
        });
    }
</script>
</body>
</html>
