<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD COMBAT PRO</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .screen { position: fixed; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; background: rgba(0,0,0,0.85); }
        .btn { padding: 15px 30px; margin: 10px; border: 2px solid #9333ea; background: #000; color: #fff; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        #canvasJuego { display: block; background: url('https://ipfs.io/ipfs/TU_CID_FONDO_AQUI'); background-size: cover; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 5; background: rgba(0,0,0,0.5); padding: 10px; }
    </style>
</head>
<body>

    <div id="bienvenida" class="screen">
        <h1 style="color:#9333ea">RETOS ZAARD</h1>
        <button class="btn" onclick="irAlMenu()">ENTRAR</button>
    </div>

    <div id="menu" class="screen" style="display:none;">
        <button class="btn" onclick="iniciarJuego(false)">MODO GRATIS</button>
        <button class="btn" onclick="iniciarJuego(true)">APOSTAR 0.000005 BNB</button>
    </div>

    <div class="hud">Tiempo: <span id="timer">60</span>s | Score: <span id="score">0</span></div>
    <canvas id="canvasJuego"></canvas>

    <script>
        const ZARD_CONTRACT = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        const POOL_CONTRACT = "0x7084d8562532aea9f9239cdd63ea289c85e6b0e9";
        const CID_NAVE = "https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m";
        
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        const naveImg = new Image(); naveImg.src = CID_NAVE;
        const musica = new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); // Pon aquí tu link de audio

        function irAlMenu() { document.getElementById('bienvenida').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; musica.play(); musica.loop = true; }

        async function iniciarJuego(apuesta) {
            if(apuesta) {
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();
                    const tx = await signer.sendTransaction({ to: POOL_CONTRACT, value: ethers.utils.parseEther("0.000005") });
                    await tx.wait();
                } catch(e) { alert("Error de apuesta"); return; }
            }
            document.getElementById('menu').style.display = 'none';
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            juegoActivo = true;
            bucle();
        }

        let juegoActivo = false, puntos = 0;
        function bucle() {
            if(!juegoActivo) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            ctx.drawImage(naveImg, window.innerWidth/2, window.innerHeight/2, 50, 50);
            
            // Lógica simple de fin de juego para volver
            if(puntos >= 300) { alert("¡VICTORIA!"); window.location.href = '../index-menu.html'; }
            requestAnimationFrame(bucle);
        }
    </script>
</body>
</html>
