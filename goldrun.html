<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD GOLD RUN - PANGA EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #050515; overflow: hidden; font-family: sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; padding: 10px; z-index: 100; }
        .btn-connect { padding: 8px 15px; background: #ffcc00; color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<div class="web3-panel">
    <div style="color: #ffcc00; font-weight: bold;">ESTADO: <span id="status">DESCONECTADO</span></div>
    <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
</div>

<script>
    const BURNS_ADDRESS = "0x0000000000000000000000000000000000000000";
    
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 1250,
        backgroundColor: '#050515',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload: preload, create: create }
    };

    const game = new Phaser.Game(config);
    let isPlaying = false;

    function preload() {
        // Gateway de Cloudflare (más estable)
        const gw = "https://cloudflare-ipfs.com/ipfs/";
        this.load.image('fondo', gw + 'bafybeibdx3yzp4tc2ju26o4eht5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('player', gw + 'bafybeid4eh5si4tdy3kpqgtnd4l2z6ehac3rkd4vjmsgdb5gqbs2vcox34');
        this.load.image('obs', gw + 'bafybeiarw4qbftgyh2rzjyw56s4cpjxtlptxtwgasgnu7rovqkvmpjgbgy');
        this.load.image('gas', gw + 'bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
    }

    function create() {
        // Lógica de Menú Inmediato
        this.add.rectangle(400, 625, 800, 1250, 0x050515); // Fondo de seguridad
        
        // Si el fondo carga después, se añade solo
        this.load.on('complete', () => {
             if (this.textures.exists('fondo')) {
                 this.add.image(400, 625, 'fondo').setDisplaySize(800, 1250).setAlpha(0.3).setDepth(-1);
             }
        });

        let title = this.add.text(400, 300, 'ZAARD: FUERZA PANGA', { 
            fontSize: '50px', fill: '#ffcc00', fontWeight: 'bold' 
        }).setOrigin(0.5);

        let info = this.add.text(400, 550, 
            'RECOLECTA 200 GAS PARA GANAR\n\n' +
            '5 VIDAS - APUESTA: 0.0001\n\n' +
            'SI PIERDES, SE QUEMA EN:\n' + BURNS_ADDRESS, 
            { fontSize: '24px', fill: '#ffffff', align: 'center' }).setOrigin(0.5);

        // Botón "Jugar como Invitado" (Hecho con gráficos, carga al instante)
        let btnBox = this.add.rectangle(400, 850, 450, 90, 0xffcc00, 0.2).setInteractive();
        let btnText = this.add.text(400, 850, 'ACTIVAR PODER', { 
            fontSize: '32px', fill: '#ffcc00', fontWeight: 'bold' 
        }).setOrigin(0.5);

        btnBox.on('pointerdown', () => {
            title.destroy(); info.destroy(); btnBox.destroy(); btnText.destroy();
            iniciarJuego.call(this);
        });

        // Animación de parpadeo
        this.tweens.add({ targets: btnText, alpha: 0.4, duration: 1000, yoyo: true, loop: -1 });
    }

    function iniciarJuego() {
        isPlaying = true;
        // Aquí empieza la lógica de los sprites...
        this.add.text(400, 100, 'CORRIENDO...', { fill: '#ffcc00' }).setOrigin(0.5);
        console.log("Iniciado");
    }

    async function connectWallet() {
        if (window.ethereum) {
            const acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('status').innerText = "CONECTADO";
            document.getElementById('connectBtn').innerText = acc[0].substring(0,6)+"...";
        }
    }
</script>
</body>
</html>
