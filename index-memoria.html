<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD MEMORY 7x7 | Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        #ui { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: #020006; }
        .box { background: rgba(0,0,0,0.9); border: 2px solid #34c1ea; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 30px #34c1ea; }
        button { margin: 15px; padding: 20px 40px; cursor: pointer; background: #16a34a; border: none; color: white; font-weight: bold; border-radius: 10px; font-size: 18px; }
    </style>
</head>
<body>

<div id="ui">
    <div id="bienvenida" class="box">
        <h1>BIENVENIDO A ZAARD</h1>
        <p>Prueba tu memoria y gana recompensas.</p>
        <button onclick="showMenu()">ACEPTAR RETO</button>
    </div>
    <div id="menu" class="box" style="display:none;">
        <h1>SELECCIONA MODO</h1>
        <button onclick="iniciar(false)">JUGAR INVITADO</button>
        <button onclick="iniciar(true)">CONECTAR WEB3</button>
    </div>
</div>

<script>
    const cids = [
        "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a",
        "bafkreic6hmavutykpcpviuxv4pq3xkgcquznb5j4zw7zbsrmwp5jnhylcy",
        "bafkreigufyxj7u4z7dgdkkghqbwyykmbtzp4ysxa7vau5a7at4bix4qmca",
        "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli",
        "bafkreia3b625wibxbftpcbdjqwqjnuthccdr2nrl6t3oflfne7w4dcqmaq",
        "bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4",
        "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue",
        "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq",
        "bafkreihtzxh5dazi4c3vueo5glxbycstfdesswsus73c4uwah5xwunyowa",
        "bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm"
    ];

    function showMenu() { document.getElementById('bienvenida').style.display = 'none'; document.getElementById('menu').style.display = 'block'; }

    function iniciar(web3) {
        document.getElementById('ui').style.display = 'none';
        new Phaser.Game({
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            scene: {
                preload: function() {
                    cids.forEach((cid, i) => this.load.image('c'+i, 'https://ipfs.io/ipfs/' + cid));
                    this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                },
                create: function() {
                    this.add.rectangle(0,0, 4000, 4000, 0x020006);
                    this.vidas = 6;
                    this.txt = this.add.text(50, 50, 'Oportunidades: 6', { fontSize: '40px', fill: '#34c1ea' });
                    
                    let deck = []; for(let i=0; i<24; i++) { deck.push(i%10, i%10); }
                    Phaser.Utils.Array.Shuffle(deck);

                    deck.forEach((id, i) => {
                        let card = this.add.sprite(150 + (i % 7) * 120, 200 + Math.floor(i / 7) * 120, 'dorso').setScale(0.15).setInteractive();
                        card.cid = 'c'+id;
                        card.on('pointerdown', () => {
                            if(this.lock || card.texture.key !== 'dorso') return;
                            card.setTexture(card.cid);
                            if(!this.p1) this.p1 = card;
                            else {
                                this.lock = true;
                                if(this.p1.cid !== card.cid) {
                                    setTimeout(() => {
                                        this.p1.setTexture('dorso'); card.setTexture('dorso');
                                        this.p1 = null; this.lock = false;
                                        this.vidas--; this.txt.setText('Oportunidades: ' + this.vidas);
                                        if(this.vidas <= 0) { alert("¡Perdiste!"); location.reload(); }
                                    }, 800);
                                } else { this.p1 = null; this.lock = false; }
                            }
                        });
                    });
                }
            }
        });
    }
</script>
</body>
</html>
