<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY COMBAT: ZAARD</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: rgba(0,0,0,0.85); }
        .btn { padding: 15px 30px; margin: 10px; border: 2px solid #9333ea; background: #1a1a1a; color: #fff; cursor: pointer; font-size: 1.1rem; border-radius: 10px; }
        #canvasJuego { display: none; background: #020006; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 5; font-size: 1.5rem; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bienvenida" class="screen">
        <h1 style="color:#9333ea">ZAARD COMBAT</h1>
        <button class="btn" onclick="irAlMenu()">ENTRAR A LA BATALLA</button>
    </div>

    <div id="menu" class="screen" style="display:none;">
        <h2>SELECCIONA MODO</h2>
        <button class="btn" onclick="iniciarJuego(false)">INVITADO (GRATIS)</button>
        <button class="btn" onclick="iniciarJuego(true)">CONECTAR WALLET (APUESTA)</button>
    </div>

    <div class="hud">Tiempo: <span id="timer">60</span>s | Destruidos: <span id="score">0</span></div>
    <canvas id="canvasJuego"></canvas>

    <script>
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        const CID_OBSTACULO = 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m';
        const CID_NAVE = 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m';
        
        const imgEnemigo = new Image(); imgEnemigo.src = CID_OBSTACULO;
        const imgNave = new Image(); imgNave.src = CID_NAVE;

        let nave = { x: 0, y: 0, w: 60, h: 60 }, enemigos = [], balas = [], puntos = 0, timeLeft = 60, juegoActivo = false;

        function irAlMenu() { document.getElementById('bienvenida').style.display = 'none'; document.getElementById('menu').style.display = 'flex'; }

        async function iniciarJuego(apuesta) {
            if(apuesta) {
                try { await window.ethereum.request({ method: 'eth_requestAccounts' }); } 
                catch(e) { alert("Conexión fallida"); return; }
            }
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            nave.x = canvas.width/2 - 30; nave.y = canvas.height - 120;
            juegoActivo = true;
            setInterval(() => { if(juegoActivo && timeLeft > 0) timeLeft--; }, 1000);
            bucle();
        }

        window.addEventListener('touchmove', (e) => { nave.x = e.touches[0].clientX - 30; });

        function bucle() {
            if(!juegoActivo) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            if(timeLeft <= 0) { alert("TIEMPO AGOTADO. Destruidos: " + puntos); location.reload(); }
            document.getElementById('timer').innerText = timeLeft;

            if(Math.random() < 0.05) balas.push({x: nave.x + 27, y: nave.y});
            ctx.drawImage(imgNave, nave.x, nave.y, nave.w, nave.h);

            if(Math.random() < 0.04) enemigos.push({x: Math.random()*(canvas.width-50), y: -50});
            enemigos.forEach((e, i) => {
                e.y += 4;
                ctx.drawImage(imgEnemigo, e.x, e.y, 50, 50);
                if(e.y > canvas.height) enemigos.splice(i, 1);
            });

            balas.forEach((b, i) => {
                b.y -= 12;
                ctx.fillStyle = '#ff0'; ctx.fillRect(b.x, b.y, 4, 10);
                enemigos.forEach((e, ei) => {
                    if(b.x > e.x && b.x < e.x+50 && b.y < e.y+50) {
                        enemigos.splice(ei, 1); balas.splice(i, 1);
                        puntos++; document.getElementById('score').innerText = puntos;
                    }
                });
            });
            requestAnimationFrame(bucle);
        }
    </script>
</body>
</html>
