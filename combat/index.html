<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>COMBAT RUN: ZAARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        body { background: #020006; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        .bg-zaard { background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m') center/cover no-repeat; }
        .btn-epic { background: linear-gradient(135deg, #9333ea, #16a34a); padding: 15px 30px; border-radius: 12px; font-weight: 900; cursor: pointer; border: 1px solid #fff; }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-zaard">

    <!-- BIENVENIDA -->
    <div id="pantalla-bienvenida" class="p-8 bg-black/80 border-2 border-purple-500 rounded-3xl text-center max-w-sm z-20">
        <h1 class="text-3xl font-black text-purple-400 neon-glow">COMBAT RUN</h1>
        <p class="mt-4 text-sm text-gray-300">Elimina 100 obstáculos. ¡10 impactos por enemigo!</p>
        <button onclick="iniciarExperienciaAudio()" class="mt-6 w-full btn-epic">INICIAR MISIÓN</button>
    </div>

    <!-- MENÚ APUESTAS -->
    <div id="menu-juego" class="hidden p-8 bg-black/80 border-2 border-purple-500 rounded-3xl text-center max-w-sm z-20">
        <h2 class="text-2xl font-bold mb-4">SELECCIONA APUESTA</h2>
        <button onclick="prepararJuego('ZARD')" class="w-full my-2 py-3 bg-purple-900 rounded-lg">APOSTAR 0.0001 ZARD</button>
        <button onclick="prepararJuego('BNB')" class="w-full my-2 py-3 bg-green-900 rounded-lg">APOSTAR 0.000005 BNB</button>
        <button onclick="iniciarJuego()" class="w-full my-2 py-3 bg-gray-800 rounded-lg">MODO INVITADO</button>
    </div>

    <canvas id="canvasJuego" class="hidden absolute top-0 left-0 w-full h-full z-10"></canvas>

    <script>
        // CONFIGURACIÓN DE AUDIO (Reemplaza estas URLs con tus CIDs de archivos .mp3)
        const audio = {
            musica: new Audio('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'),
            disparo: new Audio('https://actions.google.com/sounds/v1/weapons/laser_gun_shot.ogg'),
            explosion: new Audio('https://actions.google.com/sounds/v1/explosions/medium_explosion_loud.ogg')
        };
        audio.musica.loop = true;

        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        let nave = { x: 200, y: 500 }, enemigos = [], balas = [], juegoActivo = false;

        function iniciarExperienciaAudio() {
            audio.musica.play();
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-juego').style.display = 'block';
        }

        async function prepararJuego(tipo) {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                iniciarJuego();
            } catch(e) { alert("Conecta tu billetera."); }
        }

        function iniciarJuego() {
            document.getElementById('menu-juego').style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            juegoActivo = true;
            bucle();
        }

        window.addEventListener('touchmove', (e) => {
            nave.x = e.touches[0].clientX - 30;
            if(Math.random() > 0.8) {
                balas.push({x: nave.x + 25, y: nave.y});
                audio.disparo.currentTime = 0;
                audio.disparo.play();
            }
        });

        function bucle() {
            if(!juegoActivo) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            if(Math.random() < 0.02) enemigos.push({x: Math.random()*(canvas.width-40), y: -50, vida: 10});
            
            enemigos.forEach((e, i) => {
                e.y += 3;
                ctx.fillStyle = 'red';
                ctx.fillRect(e.x, e.y, 40, 40);
                if(e.y > canvas.height) { juegoActivo = false; alert("Perdiste"); location.reload(); }
            });

            balas.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = 'yellow';
                ctx.fillRect(b.x, b.y, 5, 10);
                enemigos.forEach((e, ei) => {
                    if(b.x > e.x && b.x < e.x+40 && b.y < e.y+40) {
                        e.vida--;
                        balas.splice(i, 1);
                        if(e.vida <= 0) { enemigos.splice(ei, 1); audio.explosion.play(); }
                    }
                });
            });
            requestAnimationFrame(bucle);
        }
    </script>
</body>
</html>
