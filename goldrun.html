<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - Fuerza PANGA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 2px solid #f3ba2f; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 640,
        parent: 'game-container',
        backgroundColor: '#000000',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText, gameSpeed = 360, isPlaying = false, bgMusic;

    function preload() {
        // IPFS con pasarela de respaldo
        this.load.image('welcomeBg', 'https://ipfs.io/ipfs/bafybeigcq6o2axe2fcz3jk4timmuq2xkow5kdgd5msasbnyzaup4lmjui4');
        
        // Generar texturas básicas de inmediato (sin esperar archivos)
        let g = this.make.graphics({x: 0, y: 0, add: false});
        g.fillStyle(0xffffff, 1); g.fillTriangle(0, 40, 20, 0, 40, 40);
        g.generateTexture('player', 40, 40); g.clear();
        g.fillStyle(0xf3ba2f, 1); g.fillCircle(15, 15, 15);
        g.generateTexture('gas', 30, 30); g.clear();
        g.fillStyle(0xff0000, 1); g.fillRect(0, 0, 35, 35);
        g.generateTexture('obs', 35, 35);
    }

    function create() {
        // Capa de Bienvenida
        this.welcomeLayer = this.add.container(0, 0).setDepth(100);
        
        // Fondo (se muestra solo si carga)
        const bgImg = this.add.image(180, 320, 'welcomeBg').setDisplaySize(360, 640).setAlpha(0.6);
        
        const title = this.add.text(180, 150, 'ZAARD GOLD RUN', { fontSize: '34px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5);
        const rules = this.add.text(180, 300, 'REGLAS:\n\n- Atrapa el GAS (Dorado)\n- Esquiva Obstáculos (Rojo)\n- ¡Velocidad nivel PANGA!', { fontSize: '18px', fill: '#ffffff', align: 'center' }).setOrigin(0.5);
        
        const btnBg = this.add.rectangle(180, 480, 280, 70, 0xf3ba2f).setInteractive();
        const btnText = this.add.text(180, 480, 'PRUEBA TU FUERZA PANGA', { fontSize: '18px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5);

        this.welcomeLayer.add([bgImg, title, rules, btnBg, btnText]);

        // Elementos de juego (Ocultos hasta el click)
        scoreText = this.add.text(180, 50, 'ZAARD GAS: 0', { fontSize: '28px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5).setVisible(false);
        player = this.physics.add.sprite(180, 560, 'player').setCollideWorldBounds(true).setVisible(false);
        items = this.physics.add.group();

        btnBg.on('pointerdown', () => {
            this.welcomeLayer.setVisible(false);
            isPlaying = true;
            score = 0;
            gameSpeed = 360;
            scoreText.setVisible(true).setText('ZAARD GAS: 0');
            player.setVisible(true).setX(180);
        });

        this.physics.add.overlap(player, items, (p, item) => {
            if (item.texture.key === 'gas') {
                item.destroy();
                score += 10;
                gameSpeed += 25; // Aumento agresivo
                scoreText.setText('ZAARD GAS: ' + score);
            } else {
                this.scene.restart();
                isPlaying = false;
            }
        }, null, this);

        this.time.addEvent({ delay: 600, callback: () => {
            if (!isPlaying) return;
            let x = Phaser.Math.Between(40, 320);
            let isGas = Phaser.Math.Between(0, 100) > 85; // 85% obstáculos
            let item = items.create(x, -50, isGas ? 'gas' : 'obs');
            item.setVelocityY(gameSpeed);
        }, loop: true });
    }

    function update() {
        if (isPlaying && this.input.activePointer.isDown) {
            player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, 0.2);
        }
        items.children.iterate(c => { if (c && c.y > 680) c.destroy(); });
    }
</script>
</body>
</html>
