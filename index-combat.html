<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD: Galaxy Combat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { background: #020006; color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        .bg-zaard { background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m') center/cover no-repeat; }
        .btn-epic { background: linear-gradient(135deg, #9333ea, #16a34a); border-radius: 12px; }
    </style>
</head>
<body class="h-screen flex items-center justify-center bg-zaard">

    <div id="pantalla-bienvenida" class="p-8 bg-black/80 border-2 border-purple-500 rounded-3xl text-center max-w-sm">
        <h1 class="text-3xl font-black neon-glow text-purple-400">GALAXY COMBAT</h1>
        <p class="mt-4 text-sm">Elimina 100 obstáculos para ganar. Cada uno requiere 10 impactos.</p>
        <button onclick="irAMenu()" class="mt-6 w-full py-4 btn-epic font-bold">ENTRAR</button>
    </div>

    <div id="menu-juego" class="hidden p-8 bg-black/80 border-2 border-purple-500 rounded-3xl text-center max-w-sm">
        <h2 class="text-2xl font-bold mb-4">SELECCIONA APUESTA</h2>
        <button onclick="prepararJuego('ZARD')" class="w-full my-2 py-3 bg-purple-900 rounded-lg">APOSTAR 0.0001 ZARD</button>
        <button onclick="prepararJuego('BNB')" class="w-full my-2 py-3 bg-green-900 rounded-lg">APOSTAR 0.000005 BNB</button>
        <button onclick="iniciarComoInvitado()" class="w-full my-2 py-3 bg-gray-800 rounded-lg">MODO INVITADO</button>
    </div>

    <canvas id="canvasJuego" class="hidden bg-black/50"></canvas>

    <script>
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        const POOL_LP = "0x7084D8562532AEA9F9239Cdd63EA289C85E6b0e9";
        
        let nave = { x: 200, y: 400, w: 50, h: 50 };
        let enemigos = [];
        let balas = [];
        let puntos = 0;
        let juegoActivo = false;

        function irAMenu() { 
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-juego').style.display = 'block';
        }

        async function prepararJuego(tipo) {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                const signer = provider.getSigner();
                // Lógica de apuesta: si es BNB enviar valor, si es ZARD transferir
                if(tipo === 'BNB') await signer.sendTransaction({to: POOL_LP, value: ethers.utils.parseEther("0.000005")});
                // ... (agregar lógica contrato ZARD aquí)
                iniciarJuego();
            } catch(e) { alert("Transacción necesaria para jugar"); }
        }

        function iniciarJuego() {
            document.getElementById('menu-juego').style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            juegoActivo = true;
            bucle();
        }

        function bucle() {
            if(!juegoActivo) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Lógica enemigos (bajando aleatoriamente)
            if(Math.random() < 0.02) enemigos.push({x: Math.random()*canvas.width, y: -50, vida: 10});
            
            enemigos.forEach((e, i) => {
                e.y += 2;
                ctx.fillStyle = 'red';
                ctx.fillRect(e.x, e.y, 40, 40);
                if(e.y > canvas.height) enemigos.splice(i, 1);
            });

            // Disparos
            balas.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = 'yellow';
                ctx.fillRect(b.x, b.y, 5, 10);
                enemigos.forEach((e, ei) => {
                    if(b.x > e.x && b.x < e.x+40 && b.y < e.y+40) {
                        e.vida--;
                        balas.splice(i, 1);
                        if(e.vida <= 0) { enemigos.splice(ei, 1); puntos++; }
                    }
                });
            });

            requestAnimationFrame(bucle);
        }

        window.addEventListener('touchmove', (e) => { nave.x = e.touches[0].clientX; balas.push({x: nave.x, y: nave.y}); });
    </script>
</body>
</html>
