<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD Arcade - Memoria HD</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        canvas {
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.5);
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <script>
        // Configuración básica para tu juego de Memoria HD
        const config = {
            type: Phaser.AUTO,
            width: 800,
            height: 600,
            backgroundColor: '#0a0a2a',
            parent: 'phaser-example',
            physics: {
                default: 'arcade',
                arcade: { debug: false }
            },
            scene: {
                preload: preload,
                create: create
            }
        };

        const game = new Phaser.Game(config);

        function preload() {
            // Aquí debes poner las rutas de tus imágenes en GitHub
            // Ejemplo: this.load.image('carta', 'assets/carta.png');
            console.log("Cargando activos de ZAARD INNOVATION...");
        }

        function create() {
            this.add.text(400, 300, 'ZAARD ARCADE\nMEMORIA HD', { 
                fontSize: '40px', 
                fill: '#00fbff', 
                align: 'center',
                fontFamily: 'Arial'
            }).setOrigin(0.5);
            
            console.log("Juego iniciado con éxito en BSC.");
        }
    </script>
</body>
</html>
