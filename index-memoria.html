<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD MEMORY ARCADE</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #020006; overflow: hidden; font-family: 'Arial', sans-serif; }
        #ui-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: flex; justify-content: center; align-items: center; background: rgba(0,0,0,0.6); }
        .ui-panel { width: 95%; max-width: 800px; background: rgba(0,0,0,0.9); border: 5px solid #5a2d82; border-radius: 50px; padding: 60px; text-align: center; box-shadow: 0 0 80px #5a2d82; }
        .banner { width: 100%; height: 350px; background-size: cover; background-position: center; border-radius: 30px; margin-bottom: 40px; border: 3px solid #bc8fef; }
        button { width: 100%; padding: 30px; margin-top: 30px; border: none; border-radius: 25px; background: linear-gradient(90deg, #5a2d82, #2ecc71); color: white; font-weight: bold; font-size: 28px; cursor: pointer; text-transform: uppercase; }
        h1 { font-size: 4em; margin: 0; color: #bc8fef; text-shadow: 0 0 20px #5a2d82; }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="pantalla-inicio" class="ui-panel">
        <div class="banner" style="background-image: url('https://ipfs.io/ipfs/bafybeiefhnawny7nlgixveiia7aaougqxsird6or4nws52vp36ndbfvixa')"></div>
        <h1>ZAARD ARCADE</h1>
        <button onclick="document.getElementById('pantalla-inicio').style.display='none'; document.getElementById('menu-seleccion').style.display='block';">¡ENTRAR AL JUEGO!</button>
    </div>

    <div id="menu-seleccion" class="ui-panel" style="display:none;">
        <div class="banner" style="background-image: url('https://ipfs.io/ipfs/bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm')"></div>
        <h2 style="color: #bc8fef; font-size: 3em;">MEMORY RUN</h2>
        <button onclick="lanzarJuego(false)">MODO INVITADO</button>
        <button onclick="conectarYJugar()">CONECTAR BILLETERA</button>
    </div>
</div>

<script>
    const TOKEN_ADDR = "0x3468EA4e6CE13Ec4C7f8651f7eFC6AA6046F4d65";
    const POOL_LP_ADDR = "0x7084D8562532AEA9F9239Cdd63EA289C85E6b0e9";
    const ABI = [{"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}];
    
    let web3, contract, userAccount, esWeb3 = false;
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSnd(freq, dur, type = 'sine') {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        let o = audioCtx.createOscillator();
        let g = audioCtx.createGain();
        o.type = type; 
        o.frequency.value = freq;
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.connect(g); 
        g.connect(audioCtx.destination);
        o.start(); 
        o.stop(audioCtx.currentTime + dur);
    }

    async function conectarYJugar() {
        if (window.ethereum) {
            try {
                web3 = new Web3(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                contract = new web3.eth.Contract(ABI, TOKEN_ADDR);
                esWeb3 = true;
                lanzarJuego(true);
            } catch (e) { alert("Conexión fallida."); }
        } else { alert("Instala MetaMask."); }
    }

    async function ejecutarPerdida() {
        if (esWeb3 && contract) {
            try {
                await contract.methods.transfer(POOL_LP_ADDR, "100000000000000").send({ from: userAccount });
            } catch (e) { console.log("Error en transferencia"); }
        }
        location.reload();
    }

    function lanzarJuego(esWeb3) {
        document.getElementById('ui-container').remove(); 
        
        new Phaser.Game({
            type: Phaser.AUTO, 
            width: window.innerWidth, 
            height: window.innerHeight,
            backgroundColor: '#020006',
            scene: {
                preload: function() {
                    const cids = ["bafybeieiiuojv6snmh2vchhigyoq7s5vcdvel66ih5tacnhp6ceaveg3um", "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a", "bafybeife5ilehfoyb5kmpvwtv7ikqvnf7x3lea3ji5ja2iju42bit42n2u", "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli", "bafybeif5pqgoxonxnxscoayvpzawsxzw5lm6upxkbslnkbgjeenf5cg24m", "bafybeift764exak3gtcylewcd5mufkfaxabusywobwg2z5mcfkp7qeaapy", "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue", "bafybeib5xg3hrhliizyw7n65reashvsqf6ritx7oi5334rbcvync27hbwe", "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq", "bafybeiafcclndycyvb5p62jjhnypzezaa2fxw2oqmlt5azvual334lgd6y"];
                    cids.forEach((c, i) => this.load.image('c'+i, 'https://ipfs.io/ipfs/'+c));
                    this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                },
                create: function() {
                    this.vidas = 10;
                    this.txt = this.add.text(60, 60, 'Oportunidades: 10', { fontSize: '50px', color: '#bc8fef' });
                    let deck = []; for(let i=0; i<18; i++) { deck.push(i%9, i%9); }
                    Phaser.Utils.Array.Shuffle(deck);
                    
                    deck.forEach((id, i) => {
                        let x = (window.innerWidth/2) - 400 + (i % 6) * 145;
                        let y = 250 + Math.floor(i / 6) * 145;
                        let card = this.add.sprite(x, y, 'dorso').setScale(0.25).setInteractive();
                        card.cid = 'c'+id;
                        card.on('pointerdown', () => {
                            playSnd(400, 0.1, 'triangle');
                            if(this.lock || card.texture.key !== 'dorso') return;
                            card.setTexture(card.cid);
                            if(!this.p1) this.p1 = card;
                            else {
                                this.lock = true;
                                if(this.p1.cid !== card.cid) {
                                    setTimeout(() => {
                                        this.p1.setTexture('dorso'); card.setTexture('dorso');
                                        this.p1 = null; this.lock = false;
                                        this.vidas--; this.txt.setText('Oportunidades: ' + this.vidas);
                                        if(this.vidas <= 0) ejecutarPerdida();
                                    }, 800);
                                } else { this.p1 = null; this.lock = false; }
                            }
                        });
                    });
                }
            }
        });
    }
</script>
</body>
</html>
