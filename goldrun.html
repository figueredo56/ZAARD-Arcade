<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - Fuerza PANGA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 2px solid #f3ba2f; box-shadow: 0 0 20px #f3ba2f; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 640,
        parent: 'game-container',
        backgroundColor: '#000000',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText, gameSpeed = 320, isPlaying = false, bgMusic;

    function preload() {
        // Fondo desde IPFS CID
        this.load.image('welcomeBg', 'https://ipfs.io/ipfs/bafybeigcq6o2axe2fcz3jk4timmuq2xkow5kdgd5msasbnyzaup4lmjui4');
        
        // Sonido (He puesto un track épico de prueba, puedes cambiar el link por tu archivo .mp3)
        this.load.audio('gameMusic', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-15.mp3');

        // Generación de texturas internas
        let g = this.make.graphics({x: 0, y: 0, add: false});
        g.fillStyle(0xffffff, 1);
        g.fillTriangle(0, 40, 20, 0, 40, 40);
        g.generateTexture('player', 40, 40);
        g.clear();
        g.fillStyle(0xf3ba2f, 1);
        g.fillCircle(15, 15, 15);
        g.generateTexture('gas', 30, 30);
        g.clear();
        g.fillStyle(0xff0000, 1);
        g.fillRect(0, 0, 35, 35);
        g.generateTexture('obs', 35, 35);
    }

    function create() {
        // Música
        bgMusic = this.sound.add('gameMusic', { loop: true, volume: 0.5 });

        // Interfaz de Bienvenida
        this.welcomeContainer = this.add.container(0, 0);
        
        // Fondo de Bienvenida (IPFS)
        const bgImg = this.add.image(180, 320, 'welcomeBg').setDisplaySize(360, 640).setAlpha(0.6);
        const overlay = this.add.rectangle(180, 320, 360, 640, 0x000000, 0.4);
        
        const title = this.add.text(180, 120, 'ZAARD GOLD RUN', { fontSize: '32px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5);
        const rules = this.add.text(180, 280, 'REGLAS:\n\n1. Atrapa el GAS (Dorado)\n2. Esquiva los Obstáculos (Rojo)\n3. La velocidad aumenta sin piedad', { fontSize: '16px', fill: '#ffffff', align: 'center', fontStyle: 'bold' }).setOrigin(0.5);
        
        const btnBg = this.add.rectangle(180, 480, 280, 70, 0xf3ba2f).setInteractive({ useHandCursor: true });
        const btnText = this.add.text(180, 480, 'PRUEBA TU FUERZA PANGA', { fontSize: '16px', fill: '#000000', fontStyle: 'bold' }).setOrigin(0.5);

        this.welcomeContainer.add([bgImg, overlay, title, rules, btnBg, btnText]);

        btnBg.on('pointerdown', () => {
            if (!bgMusic.isPlaying) bgMusic.play(); // Inicia música al aceptar
            this.welcomeContainer.setVisible(false);
            isPlaying = true;
            score = 0;
            gameSpeed = 320;
        });

        // UI de Juego
        scoreText = this.add.text(20, 20, 'ZAARD GAS: 0', { fontSize: '22px', fill: '#f3ba2f', fontStyle: 'bold' }).setAlpha(0);
        player = this.physics.add.sprite(180, 560, 'player').setCollideWorldBounds(true).setVisible(false);
        items = this.physics.add.group();

        this.time.addEvent({ delay: 650, callback: spawnItem, callbackScope: this, loop: true });
        this.physics.add.overlap(player, items, handleCollision, null, this);
    }

    function spawnItem() {
        if (!isPlaying) return;
        player.setVisible(true);
        scoreText.setAlpha(1);
        
        let x = Phaser.Math.Between(40, 320);
        // Dificultad: 75% obstáculos / 25% Gas
        let isGas = Phaser.Math.Between(0, 100) > 75;
        let item = items.create(x, -50, isGas ? 'gas' : 'obs');
        item.setVelocityY(gameSpeed);
        item.setData('type', isGas ? 'gas' : 'obs');
    }

    function handleCollision(p, item) {
        if (item.getData('type') === 'gas') {
            item.destroy();
            score += 10;
            gameSpeed += 8; // Aumenta la velocidad más rápido
            scoreText.setText('ZAARD GAS: ' + score);
        } else {
            isPlaying = false;
            bgMusic.stop(); // Detiene música al morir
            this.scene.restart();
        }
    }

    function update() {
        if (isPlaying && this.input.activePointer.isDown) {
            player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, 0.25);
        }
        items.children.iterate(child => { if (child && child.y > 680) child.destroy(); });
    }
</script>
</body>
</html>
