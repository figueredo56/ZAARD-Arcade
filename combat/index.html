<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY COMBAT: ZAARD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; margin: 0; overflow: hidden; font-family: sans-serif; }
        #canvasJuego { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="ui" class="absolute top-5 left-5 z-10 text-xl font-bold">Puntos: <span id="puntos">0</span></div>
    <canvas id="canvasJuego"></canvas>

    <script>
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let nave = { x: canvas.width/2, y: canvas.height - 100, w: 50, h: 50 };
        let enemigos = [], balas = [], puntos = 0, velocidadEnemigos = 2;

        // Controlar nave
        window.addEventListener('touchmove', (e) => { nave.x = e.touches[0].clientX - 25; });
        window.addEventListener('touchstart', () => { balas.push({x: nave.x + 22, y: nave.y}); });

        function bucle() {
            ctx.fillStyle = "#020006"; // Fondo espacio
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Generar enemigos
            if(Math.random() < 0.03) enemigos.push({x: Math.random()*(canvas.width-40), y: -50, vida: 10});

            // Dibujar Enemigos
            enemigos.forEach((e, i) => {
                e.y += velocidadEnemigos;
                ctx.fillStyle = '#ff0000';
                ctx.fillRect(e.x, e.y, 40, 40);
                if(e.y > canvas.height) enemigos.splice(i, 1); // Si pasa de largo, no pasa nada
            });

            // Dibujar Balas
            balas.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = '#ffff00'; // Bala amarilla brillante
                ctx.fillRect(b.x, b.y, 6, 12);
                
                enemigos.forEach((e, ei) => {
                    if(b.x > e.x && b.x < e.x+40 && b.y < e.y+40) {
                        e.vida--; balas.splice(i, 1);
                        if(e.vida <= 0) { 
                            enemigos.splice(ei, 1); puntos++; 
                            document.getElementById('puntos').innerText = puntos;
                            velocidadEnemigos += 0.1; // Aumenta velocidad al matar
                        }
                    }
                });
                if(b.y < 0) balas.splice(i, 1);
            });

            if(puntos >= 100) { alert("¡VICTORIA ZAARD!"); location.reload(); }
            requestAnimationFrame(bucle);
        }
        bucle();
    </script>
</body>
</html>
