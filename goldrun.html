<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - Classic Mode</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { border: 2px solid #f3ba2f; }
    </style>
</head>
<body>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 400,
        height: 600,
        backgroundColor: '#000000',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText;

    function preload() {
        // --- GRÁFICOS GENERADOS (Para evitar errores de carga) ---
        let g = this.make.graphics({x: 0, y: 0, add: false});

        // Corredor (Nave/Fénix estilizado)
        g.fillStyle(0xffffff, 1);
        g.fillTriangle(0, 40, 20, 0, 40, 40);
        g.generateTexture('player', 40, 40);
        g.clear();

        // GAS / Moneda (Círculo Dorado)
        g.fillStyle(0xf3ba2f, 1);
        g.fillCircle(15, 15, 15);
        g.generateTexture('gas', 30, 30);
        g.clear();

        // Obstáculo (Caja roja)
        g.fillStyle(0xff0000, 1);
        g.fillRect(0, 0, 35, 35);
        g.generateTexture('obs', 35, 35);
    }

    function create() {
        // Texto de puntuación
        scoreText = this.add.text(20, 20, 'ZAARD GAS: 0', { fontSize: '24px', fill: '#f3ba2f', fontStyle: 'bold' });

        // Jugador en la parte inferior
        player = this.physics.add.sprite(200, 540, 'player');
        player.setCollideWorldBounds(true);

        // Grupo de objetos (Gas y Obstáculos)
        items = this.physics.add.group();

        // Generador automático de objetos
        this.time.addEvent({
            delay: 800,
            callback: spawnItem,
            callbackScope: this,
            loop: true
        });

        // Colisiones
        this.physics.add.overlap(player, items, handleCollision, null, this);
    }

    function spawnItem() {
        let x = Phaser.Math.Between(40, 360);
        let type = Phaser.Math.Between(0, 10) > 3 ? 'gas' : 'obs'; // Más monedas que cajas
        let item = items.create(x, -50, type);
        
        item.setVelocityY(Phaser.Math.Between(200, 400));
        item.type = type; // Guardamos el tipo para saber qué chocó
    }

    function handleCollision(player, item) {
        if (item.type === 'gas') {
            item.destroy();
            score += 10;
            scoreText.setText('ZAARD GAS: ' + score);
        } else {
            // Chocó con obstáculo
            this.scene.restart();
            score = 0;
        }
    }

    function update() {
        // Movimiento suave con el dedo o mouse de lado a lado
        if (this.input.activePointer.isDown) {
            this.physics.moveTo(player, this.input.activePointer.x, 540, 300);
        } else {
            player.setVelocityX(0);
        }

        // Limpiar objetos que caen fuera
        items.children.iterate(child => {
            if (child && child.y > 650) child.destroy();
        });
    }
</script>
</body>
</html>
