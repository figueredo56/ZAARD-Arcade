<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD Arcade - Una Sola Oportunidad</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #050515; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; padding: 10px; z-index: 100; }
        .btn-connect { padding: 8px 12px; background: rgba(0, 251, 255, 0.1); border: 1px solid #00fbff; color: #00fbff; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="web3-panel">
        <div style="color: #00fbff; font-weight: bold; text-shadow: 0 0 5px #00fbff;">ZAARD INFINIT</div>
        <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800, height: 1250,
            backgroundColor: '#050515',
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { preload: preload, create: create }
        };

        const game = new Phaser.Game(config);
        let firstCard = null, secondCard = null, canMove = false, matches = 0, errors = 0;
        const MAX_ERRORS = 5;

        function preload() {
            this.load.image('fondo', 'https://ipfs.io/ipfs/bafkreifeqxh3foulnfp2fjdof2qmfgznpsbpphrfogltth5hs6e2uyiqya');
            this.load.image('trasera', 'https://ipfs.io/ipfs/bafybeiaaz2ebmyfezamhs3x7jqz5yujnhbru4v6cufyurjokddsb6bjxbu');
            this.load.image('c1', 'https://ipfs.io/ipfs/bafybeihehm24qpw57c23mjjomwwka4hngagf34zmkwvfedskn6ze7vf7e4');
            this.load.image('c2', 'https://ipfs.io/ipfs/bafybeihhyafas5pi3a2vn7tyqodntpuhxrupsxvxrm6vd2gimx7ryzvvn4');
            this.load.image('c3', 'https://ipfs.io/ipfs/bafybeia5slhxaenhai5i3xnpavjtvdqor2e7oq5pi4vhsukvme6os6qagu');
            this.load.image('c4', 'https://ipfs.io/ipfs/bafybeibkz6jikut6rsmj2grzuwlbm42g52ahg7o2kfiwrjvlo4u6byyxtm');
            this.load.image('c5', 'https://ipfs.io/ipfs/bafybeihwgutss2majkvanadmm4rwbp6kpcgywebs3cgpgwdcs45ut3srd4');
            this.load.audio('flip', ['https://labs.phaser.io/assets/audio/SoundEffects/key.wav']);
            this.load.audio('win', ['https://labs.phaser.io/assets/audio/SoundEffects/p-ping.mp3']);
            this.load.audio('fail', ['https://labs.phaser.io/assets/audio/SoundEffects/explosion.mp3']);
        }

        function create() {
            mostrarMenuPrincipal.call(this);
        }

        function mostrarMenuPrincipal() {
            this.children.removeAll(); // Limpiar pantalla
            canMove = false;
            
            this.add.image(400, 625, 'fondo').setDisplaySize(800, 1250).setAlpha(0.6);
            this.add.graphics().fillStyle(0x050515, 0.7).fillRect(0, 0, 800, 1250);
            
            this.add.text(400, 350, 'HAS LLEGADO AL LUGAR\nDONDE LA INNOVACIÓN\nSE CONVIERTE EN PODER', { 
                fontSize: '40px', fill: '#00fbff', align: 'center', fontWeight: 'bold', stroke: '#000000', strokeThickness: 8
            }).setOrigin(0.5);

            this.add.text(400, 520, 'Sumérgete en el Ecosistema ZAARD.\nDemuestra tu enfoque y gana recompensas.\n\nCada apuesta es una única oportunidad.\nSi fallas 5 veces, el Vault reclama tu ZAARD.', { 
                fontSize: '22px', fill: '#ffffff', align: 'center', fontStyle: 'italic'
            }).setOrigin(0.5);

            let txtStart = this.add.text(400, 780, '[ APOSTAR 0.0001 ZAARD ]', { 
                fontSize: '32px', fill: '#00fbff', fontWeight: 'bold'
            }).setOrigin(0.5).setInteractive();
            
            this.tweens.add({ targets: txtStart, alpha: 0.4, duration: 800, yoyo: true, loop: -1 });

            txtStart.on('pointerdown', () => {
                iniciarPartida.call(this);
            });
        }

        function iniciarPartida() {
            this.children.removeAll();
            this.add.image(400, 625, 'fondo').setDisplaySize(800, 1250).setAlpha(0.15);
            
            errors = 0; matches = 0; canMove = true;
            let errorText = this.add.text(400, 150, 'ERRORES: 0 / 5', { fontSize: '30px', fill: '#ff4444', fontWeight: 'bold' }).setOrigin(0.5);
            
            let items = ['c1','c2','c3','c4','c5','c1'];
            let deck = [];
            for(let i=0; i<6; i++) { for(let j=0; j<6; j++) { deck.push(items[i]); } }
            Phaser.Utils.Array.Shuffle(deck);

            for (let i = 0; i < 36; i++) {
                let col = i % 6;
                let row = Math.floor(i / 6);
                let card = this.add.sprite(115 + col * 115, 340 + row * 130, 'trasera').setInteractive().setScale(0.25);
                card.setData('value', deck[i]);
                
                card.on('pointerdown', function() {
                    if (!canMove || card === firstCard || card.alpha < 1) return;
                    this.sound.play('flip');
                    card.setTexture(card.getData('value'));
                    if (!firstCard) { firstCard = card; } 
                    else { 
                        secondCard = card;
                        canMove = false;
                        if (firstCard.getData('value') === secondCard.getData('value')) {
                            this.sound.play('win');
                            matches++;
                            this.tweens.add({ targets: [firstCard, secondCard], alpha: 0, duration: 400 });
                            firstCard = null; secondCard = null; canMove = true;
                            if (matches === 18) {
                                terminarPartida.call(this, "¡VICTORIA!\nRECOMPENSA ENVIADA", "#00fbff");
                            }
                        } else {
                            errors++;
                            errorText.setText(`ERRORES: ${errors} / 5`);
                            if (errors >= MAX_ERRORS) {
                                this.sound.play('fail');
                                terminarPartida.call(this, "INTENTOS AGOTADOS\nZAARD RECOLECTADO", "#ff4444");
                            } else {
                                setTimeout(() => { 
                                    if(firstCard) firstCard.setTexture('trasera'); 
                                    if(secondCard) secondCard.setTexture('trasera'); 
                                    firstCard = null; secondCard = null; canMove = true; 
                                }, 700);
                            }
                        }
                    }
                }, this);
            }
        }

        function terminarPartida(mensaje, color) {
            canMove = false;
            this.add.graphics().fillStyle(0x050515, 0.8).fillRect(0, 0, 800, 1250).setDepth(50);
            this.add.text(400, 600, mensaje, { 
                fontSize: '50px', fill: color, align: 'center', fontWeight: 'bold' 
            }).setOrigin(0.5).setDepth(51);

            this.add.text(400, 800, "Regresando al menú principal...", { fontSize: '20px', fill: '#ffffff' }).setOrigin(0.5).setDepth(51);

            setTimeout(() => {
                mostrarMenuPrincipal.call(this);
            }, 4000); // 4 segundos de pausa antes de volver al inicio
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('connectBtn').innerText = accounts[0].substring(0,6) + '...';
                } catch (err) { console.error(err); }
            } else { alert("Por favor instala MetaMask"); }
        }
    </script>
</body>
</html>
