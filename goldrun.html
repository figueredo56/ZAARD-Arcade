<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - PANGA EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 90%; left: 5%; display: flex; justify-content: space-between; z-index: 10; }
        .btn-connect { padding: 8px 15px; background: #ffcc00; color: #000; border: none; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #status { color: #fff; font-weight: bold; }
    </style>
</head>
<body>

<div class="web3-panel">
    <div style="color: #ffcc00; font-size: 14px;">ESTADO: <span id="status">DESCONECTADO</span></div>
    <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
</div>

<script>
    const VAULT_DEAD = "0x0000000000000000000000000000000000000000";
    const APUESTA = "0.0001";

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 1200,
        physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, obstacles, gasGroup, score = 0, lives = 5, isPlaying = false;

    function preload() {
        // Usando Cloudflare para evitar bloqueos y lentitud
        this.load.image('fondo', 'https://cloudflare-ipfs.com/ipfs/bafybeibdx3yzp4tc2ju26o4eht5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('player', 'https://cloudflare-ipfs.com/ipfs/bafybeibd4eh5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('obs', 'https://cloudflare-ipfs.com/ipfs/bafybeiarw4qbftgyh2rzjyw56ujcebelr6m5f6q5f6q5f6q5f6q');
        this.load.image('gas', 'https://cloudflare-ipfs.com/ipfs/bafybeihsmtiwlnw5w6jcebelr6m5f6q5f6q5f6q5f6q');
    }

    function create() {
        // Se añade el fondo centrado correctamente
        this.add.image(400, 600, 'fondo').setAlpha(0.5).setScale(2);
        
        // El resto de tu lógica de menú aquí...
        console.log("Juego iniciado correctamente");
    }

    function update() {
        // Lógica de movimiento
    }

    async function connectWallet() {
        if (window.ethereum) {
            try {
                const provider = new ethers.providers.Web3Provider(window.ethereum);
                await provider.send("eth_requestAccounts", []);
                document.getElementById('status').innerText = "CONECTADO";
                document.getElementById('connectBtn').style.display = "none";
            } catch (err) {
                alert("Error al conectar: " + err.message);
            }
        } else {
            alert("Por favor, abre este link dentro de MetaMask o Trust Wallet");
        }
    }
</script>
</body>
</html>
