<!DOCTYPE html>
<html lang="es">
<head>
    <meta property="og:title" content="ZAARD ARCADE">
    <meta property="og:description" content="Explora el centro de videojuegos inmersivos del ecosistema ZAARD.">
    <meta property="og:image" content="https://ipfs.io/ipfs/bafybeidnbe4knxriwgp3hjnpupozk5xg6f75xvvhuottvudryqmxvsrleu">
    <meta property="og:url" content="https://figueredo56.github.io/ZAARD-Arcade/">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="ZAARD ARCADE">
    <meta name="twitter:image" content="https://ipfs.io/ipfs/bafybeidnbe4knxriwgp3hjnpupozk5xg6f75xvvhuottvudryqmxvsrleu">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD ARCADE - HUB</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        #fondo { 
            width: 100%; height: 100%; 
            background-image: url('https://ipfs.io/ipfs/bafybeidnbe4knxriwgp3hjnpupozk5xg6f75xvvhuottvudryqmxvsrleu');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        #bienvenida { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: radial-gradient(circle, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.8) 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; 
            text-align: center; color: #fff; padding: 20px;
        }
        .btn-entrar { 
            padding: 18px 50px; background: linear-gradient(45deg, #d946ef, #8b5cf6); 
            border: none; color: white; font-size: 1.5rem; cursor: pointer; 
            border-radius: 50px; font-weight: bold; box-shadow: 0 0 20px #d946ef; transition: 0.3s;
        }

        /* EFECTO PALPITANTE REESTABLECIDO */
        @keyframes palpitar {
            0%, 100% { border-color: #00ff00; box-shadow: 0 0 10px #00ff00; }
            50% { border-color: #d946ef; box-shadow: 0 0 15px #d946ef; }
        }

        #contenedor-botones { position: relative; z-index: 10; width: 100%; height: 100%; }

        .btn-juego { 
            position: absolute; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.4); 
            border: 3px solid #00ff00; 
            color: #00ff00;
            font-weight: bold; font-size: 0.7rem; cursor: pointer; 
            border-radius: 12px;
            text-align: center; text-shadow: 1px 1px 2px black;
            animation: palpitar 2s infinite; /* ¡Aquí estaba el secreto! */
        }

        #btn-memoria { top: 44%; left: 10%; width: 28%; height: 7%; }
        #btn-lucky { top: 57%; left: 10%; width: 28%; height: 7%; }
        #btn-battle { top: 70%; left: 10%; width: 28%; height: 7%; }
        #btn-runs { top: 83%; left: 10%; width: 28%; height: 7%; }
        #btn-web { top: 32%; right: 18%; width: 15%; height: 5%; }
        
        #btn-token { 
            position: absolute; 
            top: 45%; right: 3.5%; 
            width: 27%; height: 18%; 
            background: url('https://ipfs.io/ipfs/bafybeiggz26x26hncisti5s5y74ciuk4yuymtczhsbwdufoql2gidl57mu') no-repeat center center;
            background-size: contain;
            border: 5px solid #00ff00;
            border-radius: 50%;
            cursor: pointer;
            animation: palpitar 1.5s infinite;
        }

        #btn-musica {
            position: absolute;
            top: 66%; right: 8%;
            width: 17%; height: 7%;
            background: rgba(0, 0, 0, 0.4);
            border: 3px solid #00ff00;
            color: #00ff00;
            font-weight: bold;
            font-size: 0.6rem;
            cursor: pointer;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            text-transform: uppercase;
            animation: palpitar 2s infinite; /* ¡También palpita! */
        }
    </style>
</head>
<body>

    <audio id="musicaFondo" loop>
        <source src="El%20Chupulún%20de%20Zaard.mp3" type="audio/mpeg">
    </audio>

    <div id="bienvenida">
        <h1>Bienvenidos a ZAARD ARCADE</h1>
        <button class="btn-entrar" onclick="iniciarExperiencia()">ENTRAR</button>
    </div>

    <div id="fondo"></div>

    <div id="contenedor-botones">
        <div id="btn-memoria" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-memoria.html'">MEMORIA</div>
        <div id="btn-lucky" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-lucky.html'">LUCKY</div>
        <div id="btn-battle" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/combat/'">BATTLE</div>
        <div id="btn-runs" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index.html'">RUNS</div>
        <div id="btn-token" onclick="window.open('https://app.binance.com/uni-qr/web3-token-details?tokenCA=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65&binanceChainId=56&chain=bsc', '_blank')"></div>
        <div id="btn-musica" onclick="toggleAudio()">MÚSICA</div>
        <div id="btn-web" class="btn-juego" onclick="window.open('https://figueredo56.github.io/zaard-official/', '_blank')">WEB</div>
    </div>

    <script>
        var musica = document.getElementById('musicaFondo');
        
        function iniciarExperiencia() {
            document.getElementById('bienvenida').style.display = 'none';
            musica.play();
        }

        function toggleAudio() {
            if (musica.paused) {
                musica.play();
            } else {
                musica.pause();
            }
        }
    </script>
</body>
</html>
