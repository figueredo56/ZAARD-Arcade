<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD ARCADE - HUB</title>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Ajuste de cuadrícula para que los cuadros sean más pequeños */
        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 80%; max-width: 350px; }
        .box { width: 80px; height: 80px; border: 2px solid #9333ea; cursor: pointer; background: #000; overflow: hidden; margin: 0 auto; }
        .box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Botón ERP fijo en la esquina inferior derecha */
        #btn-erp { position: fixed; bottom: 20px; right: 20px; padding: 10px 20px; background: #16a34a; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; border: 1px solid #fff; }
        
        #overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; z-index: 100; cursor: pointer; }
    </style>
</head>
<body>

    <div id="overlay" onclick="iniciarExperiencia()"><h1>ENTRAR A ZAARD</h1></div>

    <div class="grid-container">
        <div class="box" onclick="irA('combat')"><img src="CID_1" alt="Combat"></div>
        <div class="box" onclick="irA('memoria')"><img src="CID_2" alt="Memoria"></div>
        <div class="box" onclick="irAlToken()"><img src="CID_TOKEN" alt="ZARD"></div>
        <div class="box" onclick="irA('lucky')"><img src="CID_3" alt="Lucky"></div>
    </div>

    <!-- Botón ERP -->
    <a id="btn-erp" href="https://figueredo56.github.io/zaard-official/" target="_blank">ERP ZAARD</a>

    <script>
        function iniciarExperiencia() { document.getElementById('overlay').style.display = 'none'; }
        function irA(carpeta) { window.location.href = `/${carpeta}/index.html`; }
        function irAlToken() { window.open('https://tu-link-de-token.com', '_blank'); }
    </script>
</body>
</html>
