<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ZAARD GOLD RUN - Fuerza PANGA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.8.1/dist/web3.min.js"></script>
    <style>
        * { touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; position: fixed; width: 100%; font-family: sans-serif; }
        #game-container { border: 2px solid #f3ba2f; box-shadow: 0 0 20px #f3ba2f; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
    const VAULT = "0xbC71465eD3e4B395fe8ed46Bac764Cb4b8BbAed2";
    const BURN  = "0x000000000000000000000000000000000000dEaD";

    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 640,
        parent: 'game-container',
        backgroundColor: '#000011',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText, gameSpeed = 350, isPlaying = false, bgMusic, userAccount;

    function preload() {
        this.load.audio('music', 'https://cdn.pixabay.com/audio/2022/01/18/audio_d0a13f69d2.mp3');
        let g = this.make.graphics({x: 0, y: 0, add: false});
        g.fillStyle(0xf3ba2f, 1); g.fillTriangle(20, 0, 0, 40, 40, 40);
        g.fillStyle(0xffd700, 1); g.fillEllipse(20, 35, 60, 15);
        g.generateTexture('skin', 60, 50); g.clear();
        g.fillStyle(0xf3ba2f, 1); g.fillCircle(15, 15, 15); g.generateTexture('gas', 30, 30); g.clear();
        g.fillStyle(0xff0000, 1); g.fillTriangle(17, 0, 0, 35, 35, 35); g.generateTexture('obs', 35, 35);
    }

    function create() {
        createStars.call(this);
        try { bgMusic = this.sound.add('music', { loop: true, volume: 0.5 }); } catch(e){}
        showMenu.call(this);
    }

    function createStars() {
        for (let i = 0; i < 80; i++) {
            this.add.circle(Phaser.Math.Between(0, 360), Phaser.Math.Between(0, 640), 1, 0xffffff, Phaser.Math.FloatBetween(0.3, 0.8));
        }
    }

    function showMenu() {
        this.menu = this.add.container(0, 0).setDepth(100);
        const title = this.add.text(180, 80, 'ZAARD GOLD RUN', { fontSize: '30px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5);
        const infoBox = this.add.text(180, 220, 'RECOMPENSAS:\n• BRONCE: 100 GAS\n• PLATA: 200 GAS\n• ORO: 500 GAS\n\nApuesta: 0.0001 ZAARD', { fontSize: '15px', fill: '#ffffff', align: 'center', lineSpacing: 6 }).setOrigin(0.5);
        
        const btnP = this.add.rectangle(180, 460, 240, 50, 0x333333).setInteractive();
        const txtP = this.add.text(180, 460, 'MODO PRÁCTICA', { fontSize: '16px', fill: '#fff' }).setOrigin(0.5);

        const btnA = this.add.rectangle(180, 530, 240, 50, 0xf3ba2f).setInteractive();
        const txtA = this.add.text(180, 530, 'CONECTAR Y APOSTAR', { fontSize: '16px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5);

        this.menu.add([title, infoBox, btnP, txtP, btnA, txtA]);

        btnP.on('pointerdown', () => start.call(this, false));
        btnA.on('pointerdown', () => connectWallet.call(this));

        scoreText = this.add.text(180, 40, 'GAS: 0', { fontSize: '28px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5).setVisible(false).setDepth(10);
        player = this.physics.add.sprite(180, 560, 'skin').setCollideWorldBounds(true).setVisible(false).setDepth(5);
        items = this.physics.add.group();

        this.physics.add.overlap(player, items, (p, item) => {
            if (item.texture.key === 'gas') {
                item.destroy(); score++; gameSpeed += 5; scoreText.setText('GAS: ' + score);
            } else { die.call(this); }
        });
    }

    async connectWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                alert("Conectado: " + userAccount.substring(0,6) + "...");
                start.call(this, true);
            } catch (err) { alert("Error al conectar"); }
        } else { alert("Abre este link en el navegador de MetaMask/TrustWallet"); }
    }

    function start(bet) {
        if(this.menu) this.menu.destroy();
        isPlaying = true; score = 0; gameSpeed = 350;
        scoreText.setVisible(true).setText('GAS: 0');
        player.setVisible(true).setX(180);
        if (bgMusic && !bgMusic.isPlaying) { this.sound.resumeAll(); bgMusic.play(); }
    }

    function spawn() {
        if (!isPlaying) return;
        let x = Phaser.Math.Between(40, 320);
        let isGas = Phaser.Math.Between(0, 100) > 60; 
        let item = items.create(x, -50, isGas ? 'gas' : 'obs');
        item.setVelocityY(gameSpeed);
    }

    function die() {
        isPlaying = false;
        if (bgMusic) bgMusic.stop();
        items.clear(true, true);
        player.setVisible(false);
        scoreText.setVisible(false);
        alert("¡FIN DEL JUEGO!\nGAS: " + score);
        this.scene.restart(); // Esto limpia y vuelve al create()
    }

    function update() {
        if (isPlaying && this.input.activePointer.isDown) {
            player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, 0.25);
        }
        items.children.iterate(c => { if (c && c.y > 680) c.destroy(); });
    }
</script>
</body>
</html>
