<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD Memory HD - Web3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <style>
        :root { 
            --gold: #FFB300; 
            --dark: #050505; 
            --bg-url: url('https://cloudflare-ipfs.com/ipfs/bafybeihmzzhikxn6f4xctz6betwprnupyq4f6kw3233vwnagcomraiftoy');
            --card-back: url('https://cloudflare-ipfs.com/ipfs/bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
        }
        
        body { 
            background: var(--bg-url) no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            text-align: center;
            min-height: 100vh;
        }

        /* Pantalla de Inicio */
        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 100; display: flex; justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .config-card {
            background: rgba(10,10,10,0.9); padding: 30px; border: 2px solid var(--gold);
            border-radius: 20px; max-width: 450px; width: 90%; box-shadow: 0 0 30px rgba(255,179,0,0.3);
        }
        .btn-action {
            background: var(--gold); border: none; padding: 15px 30px;
            border-radius: 50px; font-weight: bold; cursor: pointer; margin: 15px; font-size: 1rem;
        }

        /* Tablero 6x6 */
        .game-info { background: rgba(0,0,0,0.7); padding: 15px; border-bottom: 2px solid var(--gold); font-weight: bold; }
        .grid-6x6 {
            display: grid; grid-template-columns: repeat(6, 1fr);
            gap: 6px; max-width: 550px; margin: 20px auto; padding: 10px;
        }
        .card {
            aspect-ratio: 1/1; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.4s;
        }
        .card.flipped { transform: rotateY(180deg); }
        .card .front, .card .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 5px; border: 1px solid var(--gold);
        }
        .card .back { 
            background: var(--card-back) no-repeat center center; 
            background-size: cover; 
        }
        .card .front { 
            transform: rotateY(180deg); 
            background: rgba(20,20,20,0.95); 
            display: flex; justify-content: center; align-items: center; font-size: 1.4rem;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="snd-match" src="https://assets.mixkit.co/active_storage/sfx/2020/2020-preview.mp3"></audio>

            <p>Bienvenido: prueba tu memoria y gana recompensa.</p>
            <p style="font-size: 0.85rem; color: #bbb;">Apuesta: 0.0001 ZAARD | Recompensa: 0.0001 ZAARD<br>Objetivo: Menos de 8 intentos (Max 7).</p>
            <button class="btn-action" onclick="connectWallet()">CONECTAR BILLETERA</button>
            <div style="cursor:pointer; text-decoration: underline; color: var(--gold);" onclick="startMode(true)">Modo Invitado</div>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="game-info">
            <span id="mode-label">MODO: ---</span> | INTENTOS: <span id="attempt-count">0</span> / 7
        </div>
        <div class="grid-6x6" id="board"></div>
    </div>

            document.getElementById('game-ui').classList.remove('hidden');

            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    alert("Apuesta de 0.0001 ZAARD confirmada.");
                    startMode(false);
                } catch (e) { alert("Conexión rechazada."); }
            } else { alert("Instala MetaMask."); }
        }
