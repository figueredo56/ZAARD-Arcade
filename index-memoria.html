<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta property="og:title" content="ZAARD Memory Challenge">
    <meta property="og:description" content="Apuesta, juega y gana en el ecosistema ZAARD.">
    <meta property="og:image" content="https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m">
    <title>ZAARD Memory 6x6</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; align-items: center; background: #020006; color: white; font-family: 'Orbitron', sans-serif; }
        #game-container { margin-top: 20px; border: 3px solid #34c1ea; box-shadow: 0 0 20px rgba(52, 193, 234, 0.5); }
        .controls { margin-top: 20px; text-align: center; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: linear-gradient(135deg, #34c1ea, #16a34a); border: none; color: white; font-weight: bold; border-radius: 10px; }
        button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>

    <h1>ZAARD MEMORY 6x6</h1>
    <div id="game-container"></div>
    
    <div class="controls">
        <button id="btn-conectar">Conectar Billetera</button>
        <button id="btn-jugar" disabled>Apostar 0.0001 ZARD y Jugar</button>
    </div>

    <script>
        const contractAddress = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        const btnConectar = document.getElementById('btn-conectar');
        const btnJugar = document.getElementById('btn-jugar');

        btnConectar.onclick = async () => {
            if (window.ethereum) {
                await window.ethereum.request({ method: 'eth_requestAccounts' });
                btnJugar.disabled = false;
                alert("Billetera ZAARD conectada");
            }
        };

        btnJugar.onclick = async () => {
            const provider = new ethers.providers.Web3Provider(window.ethereum);
            const signer = provider.getSigner();
            const abi = ["function apostar() external payable"];
            const contract = new ethers.Contract(contractAddress, abi, signer);

            try {
                const tx = await contract.apostar({ value: ethers.utils.parseEther("0.0001") });
                await tx.wait();
                alert("Apuesta confirmada. ¡Iniciando Juego!");
                // Aquí se activaría el juego en Phaser
            } catch (error) {
                alert("Error en la transacción de apuesta.");
            }
        };

        const config = {
            type: Phaser.AUTO,
            width: 600,
            height: 600,
            parent: 'game-container',
            scene: { preload, create }
        };

        const game = new Phaser.Game(config);

        function preload() {
            this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
        }

        function create() {
            this.add.text(120, 280, 'Conecta tu Billetera para empezar', { fontSize: '20px', fill: '#fff' });
        }
    </script>
</body>
</html>
