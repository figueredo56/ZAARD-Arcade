<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - Oficial</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body {
            margin: 0;
            background-color: #000; /* Fondo negro puro */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #game-container {
            box-shadow: 0 0 30px rgba(243, 186, 47, 0.3);
            border-top: 3px solid #f3ba2f;
            border-bottom: 3px solid #f3ba2f;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 360,   // Ancho tipo móvil
        height: 640,  // Alto tipo móvil
        parent: 'game-container',
        mode: Phaser.Scale.FIT, // ESTO arregla el estiramiento
        autoCenter: Phaser.Scale.CENTER_BOTH,
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 900 }, debug: false }
        },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, coins, bgMusic, score = 0, scoreText;

    function preload() {
        // Fondo: Asegúrate de que el nombre coincida con tu archivo en assets
        this.load.image('background', 'assets/fondo_zaard.png'); 
        
        // Creamos la moneda REDONDA dinámicamente
        let graphics = this.make.graphics({x: 0, y: 0, add: false});
        graphics.fillStyle(0xf3ba2f, 1);
        graphics.fillCircle(15, 15, 15);
        graphics.generateTexture('coin', 30, 30);

        // Personaje (usamos un cuadro blanco temporal si no carga el sprite)
        this.load.spritesheet('dude', 'assets/dude.png', { frameWidth: 32, frameHeight: 48 });
        
        // Música
        this.load.audio('theme', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3');
    }

    function create() {
        // Fondo ajustado para que no se vea estirado
        let bg = this.add.image(180, 320, 'background');
        bg.setDisplaySize(360, 640);
        bg.setAlpha(0.7);

        // Audio
        bgMusic = this.sound.add('theme', { loop: true, volume: 0.5 });
        this.input.on('pointerdown', () => { if(!bgMusic.isPlaying) bgMusic.play(); });

        // Suelo
        let ground = this.add.rectangle(180, 630, 360, 20, 0x000000, 0);
        this.physics.add.existing(ground, true);

        // Jugador
        player = this.physics.add.sprite(180, 500, 'dude');
        player.setCollideWorldBounds(true);
        this.physics.add.collider(player, ground);

        // Grupo de Monedas (Gas)
        coins = this.physics.add.group();
        spawnCoins();

        this.physics.add.overlap(player, coins, collectCoin, null, this);

        // Texto
        scoreText = this.add.text(20, 20, 'ZAARD: 0', { fontSize: '24px', fill: '#f3ba2f', fontStyle: 'bold' });
        this.add.text(60, 600, 'Toca para saltar y activar sonido', { fontSize: '12px', fill: '#fff' });
    }

    function update() {
        // Control táctil simple para saltar
        if (this.input.activePointer.isDown && player.body.touching.down) {
            player.setVelocityY(-450);
        }
    }

    function spawnCoins() {
        for (let i = 0; i < 4; i++) {
            let x = Phaser.Math.Between(50, 310);
            let y = Phaser.Math.Between(-100, -500);
            let coin = coins.create(x, y, 'coin');
            coin.setVelocityY(Phaser.Math.Between(100, 200));
            coin.setCircle(15);
        }
    }

    function collectCoin(player, coin) {
        coin.destroy();
        score += 10;
        scoreText.setText('ZAARD: ' + score);
        if (coins.countActive() === 0) spawnCoins();
    }
</script>
</body>
</html>
