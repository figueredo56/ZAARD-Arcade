<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD Memory HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <style>
        :root { 
            --gold: #FFB300; 
            --bg-url: url('https://ipfs.io/ipfs/bafybeihmzzhikxn6f4xctz6betwprnupyq4f6kw3233vwnagcomraiftoy');
            --card-back: url('https://ipfs.io/ipfs/bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
        }
        
        body { 
            background: #000 var(--bg-url) no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            padding: 0;
            overflow: hidden; /* Evita que la pantalla rebote */
        }

        /* Capa oscura para que el fondo no sature la vista */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }

        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }

        .config-card {
            background: rgba(10, 10, 10, 0.95); padding: 30px; border: 2px solid var(--gold);
            border-radius: 20px; max-width: 350px; width: 85%; text-align: center;
            box-shadow: 0 0 20px var(--gold);
        }

        #game-ui {
            display: flex; flex-direction: column; height: 100vh; width: 100vw;
        }

        .header {
            background: rgba(0,0,0,0.85); padding: 15px; 
            text-align: center; border-bottom: 2px solid var(--gold);
            font-weight: bold; font-size: 1.2rem;
        }

        /* EL TABLERO: Ahora ocupa el centro sin apretarse */
        .grid-6x6 {
            display: grid; 
            grid-template-columns: repeat(6, 1fr);
            gap: 6px; 
            padding: 10px;
            margin: auto; /* Esto centra el tablero verticalmente */
            width: 92vw;
            max-width: 500px;
        }

        .card {
            aspect-ratio: 1/1; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.4s;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card .front, .card .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 6px; border: 1px solid var(--gold);
        }

        .card .back { 
            background: #111 var(--card-back) no-repeat center center; 
            background-size: cover; 
        }

        .card .front { 
            transform: rotateY(180deg); 
            background: #222; 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.3rem;
        }

        .hidden { display: none !important; }
        .btn-action { background: var(--gold); color: black; border: none; padding: 15px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="config-card">
            <h2 style="color: var(--gold); margin: 0 0 10px 0;">ZAARD MEMORY HD</h2>
            <p>Empareja las cartas en menos de 8 intentos.</p>
            <button class="btn-action" onclick="connectWallet()">CONECTAR BILLETERA</button>
            <p style="text-decoration: underline; cursor: pointer; font-size: 0.9rem; color: #aaa; margin-top: 15px;" onclick="startMode(true)">Modo Invitado</p>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="header">
            INTENTOS: <span id="attempt-count" style="color: var(--gold);">0</span> / 7
        </div>
        <div class="grid-6x6" id="board"></div>
    </div>

    <script>
        let attempts = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        let canFlip = true;
        const emojis = ['💎', '🚀', '🔥', '🦁', '⚡', '🛡️', '👑', '💰', '🎯', '🎰', '🔱', '🧿', '🔋', '📡', '🛸', '🪐', '🧬', '🧪'];
        let gameCards = [...emojis, ...emojis];

        function startMode(guest) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            initGame();
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    startMode(false);
                } catch (e) { alert("Error al conectar"); }
            } else { alert("Usa MetaMask"); }
        }

        function initGame() {
            const board = document.getElementById('board');
            gameCards.sort(() => Math.random() - 0.5);
            board.innerHTML = '';
            gameCards.forEach(val => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = val;
                card.innerHTML = `<div class="back"></div><div class="front">${val}</div>`;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || flippedCards.length >= 2 || card.classList.contains('flipped')) return;
            card.classList.add('flipped');
            flippedCards.push(card);
            if (flippedCards.length === 2) {
                canFlip = false;
                setTimeout(checkMatch, 700);
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.value === c2.dataset.value) {
                matchedPairs++;
                flippedCards = [];
                canFlip = true;
                if (matchedPairs === 18) alert("¡Ganaste!");
            } else {
                attempts++;
                document.getElementById('attempt-count').innerText = attempts;
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                    if (attempts >= 7) {
                        alert("Perdiste. Reintentando...");
                        location.reload();
                    }
                }, 500);
            }
        }
    </script>
</body>
</html>
