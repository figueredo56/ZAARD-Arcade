<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN - Fuerza PANGA</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #game-container { border: 2px solid #f3ba2f; box-shadow: 0 0 20px #f3ba2f; }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 640,
        parent: 'game-container',
        backgroundColor: '#000011',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText, gameSpeed = 350, isPlaying = false, bgMusic;

    function preload() {
        this.load.audio('music', 'https://cdn.pixabay.com/audio/2022/03/15/audio_7306263b84.mp3');
        let g = this.make.graphics({x: 0, y: 0, add: false});
        
        // Fénix Dorado
        g.fillStyle(0xf3ba2f, 1);
        g.fillTriangle(20, 0, 0, 40, 40, 40);
        g.fillStyle(0xffd700, 1);
        g.fillEllipse(20, 35, 60, 15);
        g.generateTexture('skin', 60, 50); g.clear();
        
        // Moneda GAS
        g.fillStyle(0xf3ba2f, 1); g.fillCircle(15, 15, 15);
        g.lineStyle(2, 0xffffff, 1); g.strokeCircle(15, 15, 12);
        g.generateTexture('gas', 30, 30); g.clear();
        
        // Cristal Rojo
        g.fillStyle(0xff0000, 1);
        g.fillTriangle(17, 0, 0, 35, 35, 35);
        g.generateTexture('obs', 35, 35);
    }

    function create() {
        // Estrellas fijas
        for (let i = 0; i < 60; i++) {
            this.add.circle(Phaser.Math.Between(0, 360), Phaser.Math.Between(0, 640), 1, 0xffffff, 0.6);
        }

        try { bgMusic = this.sound.add('music', { loop: true, volume: 0.5 }); } catch(e){}

        this.menu = this.add.container(0, 0).setDepth(100);
        const title = this.add.text(180, 150, 'ZAARD GOLD RUN', { fontSize: '32px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5);
        const btnP = this.add.rectangle(180, 300, 260, 60, 0x333333).setInteractive({ useHandCursor: true });
        const txtP = this.add.text(180, 300, 'MODO PRÁCTICA', { fontSize: '18px', fill: '#fff', fontStyle: 'bold' }).setOrigin(0.5);
        const btnA = this.add.rectangle(180, 390, 260, 60, 0xf3ba2f).setInteractive({ useHandCursor: true });
        const txtA = this.add.text(180, 390, 'MODO APUESTA', { fontSize: '18px', fill: '#000', fontStyle: 'bold' }).setOrigin(0.5);

        this.menu.add([title, btnP, txtP, btnA, txtA]);

        scoreText = this.add.text(180, 50, 'GAS: 0', { fontSize: '28px', fill: '#f3ba2f', fontStyle: 'bold' }).setOrigin(0.5).setVisible(false).setDepth(10);
        player = this.physics.add.sprite(180, 560, 'skin').setCollideWorldBounds(true).setVisible(false).setDepth(5);
        items = this.physics.add.group();

        // Al hacer clic, destruimos el menú para que no estorbe
        btnP.on('pointerdown', () => start.call(this));
        btnA.on('pointerdown', () => start.call(this));

        this.physics.add.overlap(player, items, (p, item) => {
            if (item.texture.key === 'gas') {
                item.destroy(); score++;
                gameSpeed += 5;
                scoreText.setText('GAS: ' + score);
            } else { die.call(this); }
        });

        this.time.addEvent({ delay: 550, callback: spawn, callbackScope: this, loop: true });
    }

    function start() {
        this.menu.destroy(); // Lo eliminamos por completo para liberar el touch
        isPlaying = true;
        scoreText.setVisible(true);
        player.setVisible(true);
        if (bgMusic) bgMusic.play();
    }

    function spawn() {
        if (!isPlaying) return;
        let x = Phaser.Math.Between(40, 320);
        let isGas = Phaser.Math.Between(0, 100) > 60; 
        let item = items.create(x, -50, isGas ? 'gas' : 'obs');
        item.setVelocityY(gameSpeed);
    }

    function die() {
        isPlaying = false;
        if (bgMusic) bgMusic.stop();
        alert("¡FIN DEL JUEGO!\nGAS RECOLECTADO: " + score);
        window.location.reload(); // Recarga limpia para el siguiente intento
    }

    function update() {
        if (isPlaying && this.input.activePointer.isDown) {
            // Movimiento directo al dedo
            player.x = Phaser.Math.Linear(player.x, this.input.activePointer.x, 0.25);
        }
        items.children.iterate(c => { if (c && c.y > 680) c.destroy(); });
    }
</script>
</body>
</html>
