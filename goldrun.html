<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD Memory HD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/web3/1.8.1/web3.min.js"></script>
    <style>
        :root { 
            --gold: #FFB300; 
            --bg-url: url('https://ipfs.io/ipfs/bafybeihmzzhikxn6f4xctz6betwprnupyq4f6kw3233vwnagcomraiftoy');
            --card-back: url('https://ipfs.io/ipfs/bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
        }
        
        body { 
            background: #000 var(--bg-url) no-repeat center center fixed; 
            background-size: cover;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow: hidden; /* Evita scroll innecesario */
        }

        #setup-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 100; display: flex; justify-content: center; align-items: center;
        }

        .config-card {
            background: #0a0a0a; padding: 25px; border: 2px solid var(--gold);
            border-radius: 20px; max-width: 350px; width: 85%; text-align: center;
            box-shadow: 0 0 30px rgba(255,179,0,0.3);
        }

        #game-ui {
            display: flex; flex-direction: column; height: 100vh;
        }

        .header {
            background: rgba(0,0,0,0.8); padding: 15px; 
            text-align: center; border-bottom: 2px solid var(--gold);
            font-weight: bold; font-size: 1.2rem;
        }

        .grid-6x6 {
            display: grid; 
            grid-template-columns: repeat(6, 1fr);
            gap: 5px; 
            padding: 10px;
            max-width: 500px; 
            margin: auto;
        }

        .card {
            aspect-ratio: 1/1; cursor: pointer; position: relative;
            transform-style: preserve-3d; transition: transform 0.4s;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card .front, .card .back {
            position: absolute; width: 100%; height: 100%; backface-visibility: hidden;
            border-radius: 6px; border: 1px solid var(--gold);
        }

        .card .back { 
            background: #111 var(--card-back) no-repeat center center; 
            background-size: cover; 
        }

        .card .front { 
            transform: rotateY(180deg); 
            background: linear-gradient(135deg, #222, #333); 
            display: flex; justify-content: center; align-items: center; 
            font-size: 1.5rem; /* Emojis más grandes */
        }

        .hidden { display: none !important; }
        
        .btn-action { 
            background: var(--gold); color: black; border: none; 
            padding: 15px 25px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="config-card">
            <h1 style="color: var(--gold); margin-top: 0;">ZAARD MEMORY</h1>
            <p>Empareja los 18 pares en menos de 8 intentos para ganar.</p>
            <button class="btn-action" onclick="connectWallet()">CONECTAR Y APOSTAR</button>
            <p style="text-decoration: underline; cursor: pointer; font-size: 0.9rem; margin-top: 20px; color: #888;" onclick="startMode(true)">Modo Invitado (Sin Recompensa)</p>
        </div>
    </div>

    <div id="game-ui" class="hidden">
        <div class="header">
            INTENTOS: <span id="attempt-count" style="color: var(--gold);">0</span> / 7
        </div>
        <div class="grid-6x6" id="board"></div>
    </div>

    <script>
        let attempts = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        let canFlip = true;
        
        const emojis = ['💎', '🚀', '🔥', '🦁', '⚡', '🛡️', '👑', '💰', '🎯', '🎰', '🔱', '🧿', '🔋', '📡', '🛸', '🪐', '🧬', '🧪'];
        let gameCards = [...emojis, ...emojis];

        function startMode(isGuest) {
            document.getElementById('setup-screen').classList.add('hidden');
            document.getElementById('game-ui').classList.remove('hidden');
            initGame();
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    startMode(false);
                } catch (e) { alert("Conexión rechazada"); }
            } else { 
                alert("Por favor usa el navegador de MetaMask"); 
            }
        }

        function initGame() {
            const board = document.getElementById('board');
            attempts = 0;
            matchedPairs = 0;
            document.getElementById('attempt-count').innerText = "0";
            
            // Mezclar cartas
            gameCards.sort(() => Math.random() - 0.5);
            
            board.innerHTML = '';
            gameCards.forEach((val, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.value = val;
                card.innerHTML = `
                    <div class="back"></div>
                    <div class="front">${val}</div>
                `;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || flippedCards.length >= 2 || card.classList.contains('flipped')) return;

            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                canFlip = false;
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if (c1.dataset.value === c2.dataset.value) {
                matchedPairs++;
                flippedCards = [];
                canFlip = true;
                
                if (matchedPairs === 18) {
                    setTimeout(() => {
                        alert("¡BRUTAL! Has ganado la recompensa.");
                        location.reload();
                    }, 500);
                }
            } else {
                attempts++;
                document.getElementById('attempt-count').innerText = attempts;
                
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;

                    if (attempts >= 7) {
                        alert("GAME OVER. Superaste los 7 intentos.");
                        location.reload();
                    }
                }, 1000);
            }
        }
    </script>
</body>
</html>
