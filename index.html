<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD GOLD RUN - PANGA EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #050515; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; padding: 10px; z-index: 10; }
        .btn-connect { padding: 8px 12px; background: rgba(0, 251, 255, 0.1); border: 1px solid #00fbff; color: #00fbff; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>

<div class="web3-panel">
    <div style="color: #00fbff; font-weight: bold; text-shadow: 0 0 5px #00fbff;">ZAARD GOLD RUN</div>
    <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
</div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 1250,
        backgroundColor: '#050515',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, obstacles, score = 0, isPlaying = false;

    function preload() {
        // Usamos Cloudflare para que cargue sí o sí
        this.load.image('fondo', 'https://cloudflare-ipfs.com/ipfs/bafybeibdx3yzp4tc2ju26o4eht5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('player', 'https://cloudflare-ipfs.com/ipfs/bafybeibd4eh5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('obs', 'https://cloudflare-ipfs.com/ipfs/bafybeiarw4qbftgyh2rzjyw56ujcebelr6m5f6q5f6q5f6q5f6q');
    }

    function create() {
        mostrarMenuPrincipal.call(this);
    }

    function mostrarMenuPrincipal() {
        this.children.removeAll();
        
        // Fondo con transparencia por si IPFS tarda
        this.add.image(400, 625, 'fondo').setDisplaySize(800, 1250).setAlpha(0.6);
        this.add.graphics().fillStyle(0x050515, 0.75).fillRect(0, 0, 800, 1250);

        this.add.text(400, 350, 'ZAARD GOLD RUN\nPANGA EDITION', {
            fontSize: '48px', fill: '#00fbff', align: 'center', fontWeight: 'bold', stroke: '#000000', strokeThickness: 6
        }).setOrigin(0.5);

        let btnInvitado = this.add.text(400, 750, '[ JUGAR COMO INVITADO ]', {
            fontSize: '32px', fill: '#ffffff', fontWeight: 'bold'
        }).setOrigin(0.5).setInteractive();

        btnInvitado.on('pointerdown', () => {
            iniciarJuego.call(this);
        });

        // Efecto simple de parpadeo para el botón
        this.tweens.add({ targets: btnInvitado, alpha: 0.5, duration: 800, yoyo: true, loop: -1 });
    }

    function iniciarJuego() {
        this.children.removeAll();
        isPlaying = true;
        score = 0;
        
        this.add.text(20, 50, 'PUNTOS: 0', { fontSize: '32px', fill: '#00fbff' });
        
        // Aquí iría el resto de tu lógica de movimiento y obstáculos
        console.log("Iniciando carrera...");
    }

    function update() {
        if (isPlaying) {
            // Lógica de juego activo
        }
    }

    async function connectWallet() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').innerText = accounts[0].substring(0, 6) + '...';
                console.log("Wallet lista");
            } catch (err) { console.error(err); }
        } else {
            alert("Usa el navegador de tu Wallet (MetaMask/Trust)");
        }
    }
</script>
</body>
</html>
