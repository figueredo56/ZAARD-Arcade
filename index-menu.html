<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD ARCADE - HUB</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        #fondo { 
            width: 100%; height: 100%; 
            background: url('https://ipfs.io/ipfs/bafybeibh72yyt44wdubhwzihjnagspobzprpmqi6kfi66a6b4di2rjurre') no-repeat center center; 
            background-size: contain;
            position: relative;
        }

        #bienvenida { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: rgba(0,0,0,0.4);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; 
            text-align: center; color: white; padding: 20px;
        }
        #bienvenida h1 { text-shadow: 2px 2px 10px #000; margin-bottom: 10px; color: #fff; }
        #bienvenida p { text-shadow: 1px 1px 5px #000; margin-bottom: 30px; font-size: 1.2rem; font-weight: bold; }
        .btn-entrar { 
            padding: 15px 40px; border: 2px solid #00ff00; background: rgba(0,0,0,0.2); color: #00ff00; 
            font-size: 1.3rem; cursor: pointer; border-radius: 10px; font-weight: bold;
        }

        .btn-juego { 
            position: absolute; display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.4); border: 2px solid #00ff00; color: #00ff00;
            font-weight: bold; font-size: 0.8rem; cursor: pointer; border-radius: 8px;
            text-align: center; padding: 5px; text-shadow: 1px 1px 2px black;
        }

        /* POSICIONES AJUSTADAS FINAS */
        #btn-memoria { top: 43%; left: 10%; width: 30%; height: 8%; }
        #btn-lucky { top: 56%; left: 10%; width: 30%; height: 8%; }
        #btn-battle { top: 69%; left: 10%; width: 30%; height: 8%; }
        #btn-runs { top: 82%; left: 10%; width: 30%; height: 8%; }
        
        /* WEB más arriba (top: 32%) y TOKEN más a la derecha (right: 7%) */
        #btn-token { top: 48%; right: 7%; width: 20%; height: 12%; border-radius: 50%; }
        #btn-web { top: 32%; right: 15%; width: 20%; height: 6%; }
    </style>
</head>
<body>

    <div id="bienvenida">
        <h1>Bienvenidos a ZAARD ARCADE</h1>
        <p>Pon a prueba tus habilidades y gana recompensas</p>
        <button class="btn-entrar" onclick="document.getElementById('bienvenida').style.display='none'">ENTRAR</button>
    </div>

    <div id="fondo">
        <div id="btn-memoria" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-memoria.html'">MEMORIA</div>
        <div id="btn-lucky" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-lucky.html'">LUCKY</div>
        <div id="btn-battle" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/combat/'">BATTLE</div>
        <div id="btn-runs" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index.html'">RUNS</div>
        
        <div id="btn-token" class="btn-juego" onclick="window.open('https://app.binance.com/uni-qr/web3-token-details?tokenCA=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65&binanceChainId=56&chain=bsc', '_blank')">TOKEN</div>
        <div id="btn-web" class="btn-juego" onclick="window.open('https://figueredo56.github.io/zaard-official/', '_blank')">WEB</div>
    </div>

</body>
</html>
