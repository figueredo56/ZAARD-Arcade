<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD COMBAT PRO</title>
    <script src="https://cdn.ethers.io/lib/ethers-5.2.umd.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m'); background-size: cover; }
        .btn { padding: 15px 30px; margin: 10px; border: 2px solid #9333ea; background: #000; color: #fff; cursor: pointer; font-weight: bold; }
        #canvasJuego { display: none; background: #000; }
        .hud { position: absolute; top: 10px; left: 10px; z-index: 5; font-size: 1.2rem; pointer-events: none; }
    </style>
</head>
<body>

    <div id="bienvenida" class="screen">
        <h1 style="color:#9333ea">RETOS ZAARD</h1>
        <button class="btn" onclick="irAlMenu()">ENTRAR</button>
    </div>

    <div id="menu" class="screen" style="display:none;">
        <h2>SELECCIONA APUESTA</h2>
        <button class="btn" onclick="iniciarJuego('BNB')">APOSTAR 0.000005 BNB</button>
        <button class="btn" onclick="iniciarJuego('ZARD')">APOSTAR 0.0001 ZARD</button>
        <button class="btn" onclick="iniciarJuego(false)">INVITADO (GRATIS)</button>
    </div>

    <div class="hud">Tiempo: <span id="timer">60</span>s | Destruidos: <span id="score">0</span></div>
    <canvas id="canvasJuego"></canvas>

    <script>
        const POOL_CONTRACT = "0x7084d8562532aea9f9239cdd63ea289c85e6b0e9";
        const ZARD_CONTRACT = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        
        // Sistema de audio
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSnd(freq, dur) {
            let o = audioCtx.createOscillator();
            let g = audioCtx.createGain();
            o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }

        async function iniciarJuego(modo) {
            if(modo) {
                try {
                    await window.ethereum.request({ method: 'eth_requestAccounts' });
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    const signer = provider.getSigner();

                    if(modo === 'BNB') {
                        await signer.sendTransaction({ to: POOL_CONTRACT, value: ethers.utils.parseEther("0.000005") });
                    } else if(modo === 'ZARD') {
                        // Aquí llamarías al contrato ZARD para transferir 0.0001
                        alert("Conectando contrato ZARD para apuesta...");
                    }
                } catch(e) { alert("Error: Conecta tu wallet"); return; }
            }
            
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            juegoActivo = true;
            bucle();
        }

        // Lógica de juego integrada con sonido
        // Al disparar: playSnd(100, 0.1);
        // Al destruir: playSnd(800, 0.2);
    </script>
</body>
</html>
