<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZARD: Golden Run</title>
    <meta property="og:title" content="ZAARD INNOVATION | Golden Run">
    <meta property="og:description" content="Bienvenido al ecosistema ZAARD. Desafía tus habilidades y atrapa las cajas de gas.">
    <meta property="og:image" content="https://ipfs.io/ipfs/bafybeicsg3uv7e3gc17h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body, html { font-family: 'Orbitron', sans-serif; background: #020006; overflow: hidden; user-select: none; touch-action: none; margin: 0; padding: 0; width: 100%; height: 100%; }

        .espacio-bg {
            background-color: #020005;
            background-image: 
                radial-gradient(circle at 20% 25%, rgba(147, 51, 234, 0.22) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(34, 197, 94, 0.18) 0%, transparent 45%),
                radial-gradient(circle at 50% 50%, rgba(88, 28, 135, 0.25) 0%, transparent 55%),
                radial-gradient(rgba(255, 255, 255, 0.35), rgba(255, 255, 255, 0.05) 1px, transparent 15px),
                radial-gradient(rgba(34, 197, 94, 0.4), rgba(34, 197, 94, 0.02) 2px, transparent 35px),
                radial-gradient(white, rgba(255,255,255,.12) 1px, transparent 25px);
            background-size: 100% 100%, 100% 100%, 100% 100%, 220px 220px, 380px 380px, 290px 290px;
            background-position: 0 0, 0 0, 0 0, 15px 15px, 120px 160px, 50px 70px;
            background-attachment: fixed;
        }

        .neon-glow { text-shadow: 0 0 10px rgba(147, 51, 234, 0.7), 0 0 20px rgba(34, 197, 94, 0.5); }
        .border-neon { box-shadow: 0 0 25px rgba(147, 51, 234, 0.25); border: 2px solid rgba(147, 51, 234, 0.7); }
        .btn-epic { background: linear-gradient(135deg, #9333ea 0%, #16a34a 100%); color: white !important; }
        .img-bienvenida-css { background: url('https://ipfs.io/ipfs/bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4') center/cover no-repeat; min-height: 140px; }
        .img-menu-css { background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m') center/cover no-repeat; min-height: 140px; }

        canvas { display: block; margin: 0 auto; max-width: 100%; height: auto; background: transparent; }
    </style>
</head>
<body class="espacio-bg w-screen h-screen flex flex-col items-center justify-center text-white">

    <div id="pantalla-audio" class="absolute z-30 w-full max-w-xl p-6 rounded-3xl bg-black/95 border-neon text-center mx-4">
        <h1 class="text-2xl font-black text-purple-400 tracking-wider mb-2 neon-glow">ZAARD ARCADE</h1>
        <button onclick="activarSistemas()" class="btn-epic w-full py-4 rounded-xl font-black text-lg active:scale-95 transition-transform">¡ENTRAR AL JUEGO!</button>
    </div>

    <div id="pantalla-bienvenida" class="hidden absolute z-20 w-full max-w-xl p-6 rounded-3xl bg-black/95 backdrop-blur-md border-neon text-center mx-4">
        <div class="w-full rounded-2xl mb-4 border border-purple-500/40 img-bienvenida-css"></div>
        <h1 class="text-2xl font-black text-purple-400 tracking-wider mb-1 neon-glow">BIENVENIDOS A</h1>
        <h2 class="text-3xl font-black text-white tracking-widest mb-4 border-b border-purple-500/20 pb-3">ZAARD INNOVATION</h2>
        <button onclick="irAlMenuModos()" class="btn-epic w-full py-3 rounded-xl font-black tracking-widest text-base">CONTINUAR</button>
    </div>

    <div id="menu-modos" class="hidden absolute z-10 w-full max-w-xl p-6 rounded-3xl bg-black/95 backdrop-blur-md border-neon text-center mx-4">
        <div class="w-full rounded-2xl mb-4 border border-purple-500/40 img-menu-css"></div>
        <h1 class="text-3xl font-black text-purple-400 tracking-wider mb-1 neon-glow">GOLDEN RUN</h1>
        <div class="space-y-3 max-w-sm mx-auto">
            <button onclick="prepararJuego('prueba')" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl font-bold">MODO INVITADO</button>
            <button onclick="prepararJuego('wallet')" class="w-full border border-purple-500 bg-purple-950/40 p-3 rounded-xl font-bold text-purple-300">CONECTAR BILLETERA</button>
        </div>
        <p id="mensaje-animo" class="mt-4 text-purple-400/80 font-medium italic text-xs"></p>
    </div>

    <div id="contenedor-juego" class="hidden relative w-full h-full flex flex-col items-center justify-between p-4">
        <div class="w-full max-w-2xl bg-black/80 backdrop-blur-md border-b-2 border-purple-500/80 rounded-b-2xl p-4 flex justify-between items-center z-10">
            <span id="hud-gas" class="text-2xl font-black text-green-400 neon-glow">0/150</span>
            <div id="hud-vidas" class="text-lg font-bold text-red-500">⚡⚡⚡⚡⚡⚡⚡</div>
        </div>
        <canvas id="canvasJuego" width="800" height="480" class="rounded-2xl"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        const CONTRATO_ZARD = "0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65";
        
        // CIDs de tus activos
        const imgFenix = new Image(); imgFenix.src = 'https://ipfs.io/ipfs/bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y';
        const imgGas = new Image(); imgGas.src = 'https://ipfs.io/ipfs/bafybeid4eh5si4tdy3kpqgtnd4l2z6ehac3rkd4vjmsgdb5gqbs2vcox34';
        const imgObstaculo = new Image(); imgObstaculo.src = 'https://ipfs.io/ipfs/bafybeiarw4qbftgyh2rzjyw56s4cpjxtlptxtwgasgnu7rovqkvmpjgbgy';

        let audioCtx, juegoActivo = false, fenixY = 200, fenixX = 60, fenixAncho = 75, fenixAlto = 75;
        let obstaculos = [], cajas = [], totalGasRecolectado = 0, oportunidadesRestantes = 7, velocidadActual = 5, distanciaRecorrida = 0;

        function activarSistemas() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('pantalla-audio').style.display = 'none';
            document.getElementById('pantalla-bienvenida').style.display = 'block';
        }

        function irAlMenuModos() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('menu-modos').style.display = 'block';
        }

        async function prepararJuego(modo) {
            if (modo === 'wallet') {
                // Lógica Web3 original
                try {
                    const provider = new ethers.providers.Web3Provider(window.ethereum);
                    await provider.send("eth_requestAccounts", []);
                } catch (e) { alert("Transacción cancelada."); return; }
            }
            document.getElementById('menu-modos').style.display = 'none';
            document.getElementById('contenedor-juego').style.display = 'flex';
            juegoActivo = true;
            buclePrincipal();
        }

        function buclePrincipal() {
            if (!juegoActivo) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            // Renderizado usando tus CIDs cargados
            ctx.drawImage(imgFenix, fenixX, fenixY, fenixAncho, fenixAlto);
            requestAnimationFrame(buclePrincipal);
        }

        canvas.addEventListener('touchmove', (e) => {
            const rect = canvas.getBoundingClientRect();
            fenixY = ((e.touches[0].clientY - rect.top) / rect.height) * canvas.height - (fenixAlto / 2);
        }, { passive: false });
    </script>
</body>
</html>
