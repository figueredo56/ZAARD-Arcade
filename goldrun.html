<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZAARD GOLD RUN</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        #game-container {
            border: 2px solid #f3ba2f; /* Borde dorado de ZAARD */
        }
    </style>
</head>
<body>
<div id="game-container"></div>
<script>
    const config = {
        type: Phaser.AUTO,
        width: 360,
        height: 600,
        parent: 'game-container',
        backgroundColor: '#000000',
        scale: {
            mode: Phaser.Scale.FIT,
            autoCenter: Phaser.Scale.CENTER_BOTH
        },
        physics: {
            default: 'arcade',
            arcade: { debug: false }
        },
        scene: { preload, create, update }
    };

    const game = new Phaser.Game(config);
    let player, items, score = 0, scoreText;

    function preload() {
        // GENERACIÓN DE GRÁFICOS (Sin archivos externos para evitar el cuadro verde)
        let g = this.make.graphics({x: 0, y: 0, add: false});

        // Corredor: Un triángulo blanco elegante
        g.fillStyle(0xffffff, 1);
        g.fillTriangle(0, 40, 20, 0, 40, 40);
        g.generateTexture('player', 40, 40);
        g.clear();

        // GAS: Círculo Dorado (Monedas)
        g.fillStyle(0xf3ba2f, 1);
        g.fillCircle(15, 15, 15);
        g.generateTexture('gas', 30, 30);
        g.clear();

        // Obstáculo: Cuadrado Rojo
        g.fillStyle(0xff0000, 1);
        g.fillRect(0, 0, 35, 35);
        g.generateTexture('obs', 35, 35);
    }

    function create() {
        // Puntuación
        scoreText = this.add.text(20, 20, 'ZAARD GAS: 0', { 
            fontSize: '24px', 
            fill: '#f3ba2f', 
            fontStyle: 'bold' 
        });

        // El jugador abajo
        player = this.physics.add.sprite(180, 550, 'player');
        player.setCollideWorldBounds(true);

        // Grupo de objetos
        items = this.physics.add.group();

        // Generador de objetos cada 800ms
        this.time.addEvent({
            delay: 800,
            callback: spawnItem,
            callbackScope: this,
            loop: true
        });

        // Colisiones
        this.physics.add.overlap(player, items, handleCollision, null, this);
    }

    function spawnItem() {
        let x = Phaser.Math.Between(40, 320);
        let isGas = Phaser.Math.Between(0, 10) > 3;
        let item = items.create(x, -50, isGas ? 'gas' : 'obs');
        
        item.setVelocityY(Phaser.Math.Between(250, 450));
        item.setData('type', isGas ? 'gas' : 'obs');
    }

    function handleCollision(player, item) {
        if (item.getData('type') === 'gas') {
            item.destroy();
            score += 10;
            scoreText.setText('ZAARD GAS: ' + score);
        } else {
            // GAME OVER: Reinicia
            this.scene.restart();
            score = 0;
        }
    }

    function update() {
        // Movimiento horizontal con el dedo/click
        if (this.input.activePointer.isDown) {
            let targetX = this.input.activePointer.x;
            // Suavizamos el movimiento hacia el dedo
            player.x = Phaser.Math.Linear(player.x, targetX, 0.2);
        }

        // Limpieza de memoria
        items.children.iterate(child => {
            if (child && child.y > 650) child.destroy();
        });
    }
</script>
</body>
</html>
