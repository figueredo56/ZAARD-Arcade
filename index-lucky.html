<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD LUCKY CHEST</title>
    <!-- Librería necesaria para interactuar con la Blockchain -->
    <script src="https://cdn.jsdelivr.net/npm/web3@latest/dist/web3.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Rajdhani:wght@700&display=swap');
        
        body { 
            margin: 0; 
            background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m') no-repeat center center fixed; 
            background-size: cover; 
            background-color: #000;
            color: #fff; 
            text-align: center; 
            font-family: 'Rajdhani', sans-serif; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
        }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: -1; }
        
        h1 { font-size: 4rem; color: #c77dff; text-shadow: 0 0 25px #7b2cbf; margin-bottom: 30px; text-transform: uppercase; }
        
        .aviso { background: rgba(40, 0, 70, 0.95); border: 5px solid #c77dff; padding: 30px; margin: 30px; border-radius: 25px; font-size: 2rem; color: #fff; box-shadow: 0 0 40px #7b2cbf; }
        
        .btn { padding: 25px 50px; background: linear-gradient(45deg, #7b2cbf, #3c096c); cursor: pointer; border: 4px solid #c77dff; border-radius: 20px; color: white; font-weight: bold; font-size: 2rem; margin: 20px; text-transform: uppercase; box-shadow: 0 0 30px #7b2cbf; }
        
        .chests-container { display: flex; gap: 30px; margin-top: 50px; flex-wrap: wrap; justify-content: center; }
        .chest { width: 200px; cursor: pointer; border: 5px solid #c77dff; border-radius: 20px; overflow: hidden; transition: 0.3s; }
        .chest:hover { transform: scale(1.1); box-shadow: 0 0 50px #c77dff; }
        
        #status-msg { font-size: 2.5rem; margin-top: 50px; color: #e0aaff; font-weight: bold; padding: 0 30px; text-shadow: 3px 3px 10px #000; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="welcome-area">
        <h1>ZAARD LUCKY CHEST</h1>
        <div class="aviso">
            APUESTA: 0.0001 ZAARD<br>
            PREMIO: 0.00015 ZAARD<br>
            <small>CONTRATO: 0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65</small>
        </div>
        <button class="btn" onclick="conectarCartera()">CONECTAR CARTERA</button>
        <button class="btn" onclick="iniciarJuego()">MODO INVITADO</button>
    </div>

    <div id="game-area" style="display:none;">
        <h1 style="font-size: 4rem;">¡ELIGE TU CAJA!</h1>
        <div class="chests-container">
            <div class="chest" onclick="abrirCaja(1)"><img src="https://ipfs.io/ipfs/bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4" width="100%"></div>
            <div class="chest" onclick="abrirCaja(2)"><img src="https://ipfs.io/ipfs/bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue" width="100%"></div>
            <div class="chest" onclick="abrirCaja(3)"><img src="https://ipfs.io/ipfs/bafybeid4eh5si4tdy3kpqgtnd4l2z6ehac3rkd4vjmsgdb5gqbs2vcox34" width="100%"></div>
            <div class="chest" onclick="abrirCaja(4)"><img src="https://ipfs.io/ipfs/bafybeiefhnawny7nlgixveiia7aaougqxsird6or4nws52vp36ndbfvixa" width="100%"></div>
            <div class="chest" onclick="abrirCaja(5)"><img src="https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m" width="100%"></div>
        </div>
        <div id="status-msg"></div>
        <br><button class="btn" onclick="location.reload()">REINICIAR</button>
    </div>

    <script>
        // Configuración de direcciones
        const POOL_LP_ADDR = "0x7084D8562532AEA9F9239Cdd63EA289C85E6b0e9";
        const TOKEN_ADDR = "0x3468EA4e6CE13Ec4C7f8651f7eFC6AA6046F4d65";
        const ABI = [{"constant":false,"inputs":[{"name":"_to","type":"address"},{"name":"_value","type":"uint256"}],"name":"transfer","outputs":[{"name":"","type":"bool"}],"type":"function"}];
        
        let web3, contract, userAccount;

        async function conectarCartera() {
            if (window.ethereum) {
                web3 = new Web3(window.ethereum);
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                userAccount = accounts[0];
                contract = new web3.eth.Contract(ABI, TOKEN_ADDR);
                iniciarJuego();
            } else { alert("Instala MetaMask"); }
        }

        function iniciarJuego() {
            document.getElementById('welcome-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'flex';
        }

        async function abrirCaja(n) {
            const msg = document.getElementById('status-msg');
            const gano = Math.random() < 0.25; 
            const amount = "100000000000000"; // 0.0001 ZAARD

            if (gano) {
                msg.innerText = "¡FELICIDADES! Tus 0.00015 ZAARD ya están en tu cartera.";
                msg.style.color = "#c77dff";
            } else {
                if (contract && userAccount) {
                    try {
                        msg.innerText = "Procesando...";
                        await contract.methods.transfer(POOL_LP_ADDR, amount).send({ from: userAccount });
                        msg.innerText = "Mejor suerte la próxima. Tu apuesta fortalece el Pool de Liquidez.";
                    } catch (e) {
                        msg.innerText = "Transacción cancelada o error.";
                    }
                } else {
                    msg.innerText = "Intenta luego, sigue intentando. Mejor suerte la próxima, ¡no te desanimes!";
                }
                msg.style.color = "#ff4d6d";
            }
        }
    </script>
</body>
</html>
