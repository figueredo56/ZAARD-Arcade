<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALAXY COMBAT: ZAARD</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; touch-action: none; }
        .screen { position: absolute; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .btn { padding: 20px 40px; margin: 10px; border: 2px solid #9333ea; background: rgba(0,0,0,0.8); color: #fff; cursor: pointer; font-size: 1.2rem; }
        #canvasJuego { display: none; background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m'); background-size: cover; }
    </style>
</head>
<body>

    <!-- BIENVENIDA -->
    <div id="bienvenida" class="screen" style="background: url('https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m') center/cover;">
        <h1>BIENVENIDO A ZAARD</h1>
        <button class="btn" onclick="irAlMenu()">ENTRAR</button>
    </div>

    <!-- MENÚ -->
    <div id="menu" class="screen" style="display:none; background: #000;">
        <h2>SELECCIONA MODO</h2>
        <button class="btn" onclick="iniciarJuego('FACIL')">MODO FÁCIL</button>
        <button class="btn" onclick="iniciarJuego('DIFICIL')">MODO ZAARD</button>
    </div>

    <canvas id="canvasJuego"></canvas>

    <script>
        const canvas = document.getElementById('canvasJuego');
        const ctx = canvas.getContext('2d');
        
        // Assets (CIDs)
        const imgObstaculo = new Image(); imgObstaculo.src = 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m';
        
        let nave = { x: window.innerWidth/2, y: window.innerHeight - 100, w: 50, h: 50 };
        let enemigos = [], balas = [], puntos = 0, juegoActivo = false, velE = 2;

        function irAlMenu() {
            document.getElementById('bienvenida').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }

        function iniciarJuego(modo) {
            document.getElementById('menu').style.display = 'none';
            canvas.style.display = 'block';
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            velE = (modo === 'DIFICIL') ? 5 : 2;
            juegoActivo = true;
            bucle();
        }

        window.addEventListener('touchmove', (e) => { nave.x = e.touches[0].clientX - 25; });

        function bucle() {
            if(!juegoActivo) return;
            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            // Disparo auto
            if(Math.random() < 0.1) balas.push({x: nave.x + 22, y: nave.y});
            
            // Nave
            ctx.fillStyle = "#9333ea";
            ctx.fillRect(nave.x, nave.y, nave.w, nave.h);

            // Enemigos
            if(Math.random() < 0.03) enemigos.push({x: Math.random()*(canvas.width-40), y: -50});
            enemigos.forEach((e, i) => {
                e.y += velE;
                ctx.drawImage(imgObstaculo, e.x, e.y, 40, 40);
                if(e.y > canvas.height) enemigos.splice(i, 1);
            });

            // Balas
            balas.forEach((b, i) => {
                b.y -= 10;
                ctx.fillStyle = '#ff0';
                ctx.fillRect(b.x, b.y, 5, 10);
                // Colisiones
                enemigos.forEach((e, ei) => {
                    if(b.x > e.x && b.x < e.x+40 && b.y < e.y+40) {
                        enemigos.splice(ei, 1); balas.splice(i, 1);
                        puntos++;
                        if(puntos >= 100) { alert("¡VICTORIA!"); location.reload(); }
                    }
                });
            });
            requestAnimationFrame(bucle);
        }
    </script>
</body>
</html>
