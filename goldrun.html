<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD GOLD RUN - PANGA EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Courier New', Courier, monospace; }
        .web3-panel { position: fixed; top: 10px; width: 90%; left: 5%; display: flex; justify-content: space-between; padding: 10px; z-index: 100; background: rgba(0,0,0,0.8); border: 1px solid #ffcc00; border-radius: 8px; }
        .btn-connect { padding: 5px 10px; background: #ffcc00; color: #000; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="web3-panel">
        <div style="color: #ffcc00; font-size: 14px;">ESTADO: <span id="status">SISTEMA LISTO</span></div>
        <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR BILLETERA</button>
    </div>

    <script>
        const VAULT_DEAD = "0x0000000000000000000000000000000000000000";
        const APUESTA = "0.0001";
        
        const config = {
            type: Phaser.AUTO,
            width: 800, height: 1200,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, obstacles, gasGroup, score = 0, lives = 5, isPlaying = false, speed = 400;
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function preload() {
            // CIDs Proporcionados por Panga
            this.load.image('fondo', 'https://ipfs.io/ipfs/bafybeibdx3yzp4tc2ju26olduf3fpnfjlehprjnok34ieultowkfwvxjaa');
            this.load.image('player', 'https://ipfs.io/ipfs/bafybeid4eh5si4tdy3kpqgtnd4l2z6ehac3rkd4vjmsgdb5gqbs2vcox34');
            this.load.image('obs', 'https://ipfs.io/ipfs/bafybeiarw4qbftgyh2rzjyw56s4cpjxtlptxtwgasgnu7rovqkvmpjgbgy');
            this.load.image('gas', 'https://ipfs.io/ipfs/bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
        }

        function create() {
            this.add.image(400, 600, 'fondo').setAlpha(0.4).setScale(1.5);
            mostrarMenu.call(this);
        }

        function mostrarMenu() {
            isPlaying = false;
            let titulo = this.add.text(400, 400, 'ZAARD GOLD RUN\nPANGA LUCHA', { fontSize: '60px', fill: '#ffcc00', align: 'center', fontWeight: 'bold' }).setOrigin(0.5);
            let info = this.add.text(400, 600, `APUESTA: ${APUESTA} ZAARD\nOBJETIVO: 200 GAS\nVIDAS: 5`, { fontSize: '32px', fill: '#fff', align: 'center' }).setOrigin(0.5);
            
            let btn = this.add.text(400, 800, '[ INICIAR PROTOCOLO ]', { fontSize: '40px', fill: '#00ff00', background: '#000' }).setOrigin(0.5).setInteractive();
            
            btn.on('pointerdown', () => {
                titulo.destroy(); info.destroy(); btn.destroy();
                iniciarJuego.call(this);
            });
        }

        function iniciarJuego() {
            score = 0; lives = 5; speed = 400; isPlaying = true;
            
            player = this.physics.add.sprite(400, 1000, 'player').setScale(0.2).setCollideWorldBounds(true);
            obstacles = this.physics.add.group();
            gasGroup = this.physics.add.group();

            scoreText = this.add.text(20, 80, 'GAS RECOLECTADO: 0', { fontSize: '30px', fill: '#00ff00' });
            livesText = this.add.text(20, 130, 'ESCUDOS: 5', { fontSize: '30px', fill: '#ff0000' });

            this.time.addEvent({ delay: 800, callback: spawnObjects, callbackScope: this, loop: true });
            
            this.physics.add.overlap(player, gasGroup, collectGas, null, this);
            this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

            this.input.on('pointermove', (p) => { if(isPlaying) player.x = p.x; });
        }

        function spawnObjects() {
            if(!isPlaying) return;
            let x = Phaser.Math.Between(50, 750);
            if(Math.random() > 0.4) {
                let o = obstacles.create(x, -50, 'obs').setScale(0.15);
                o.setVelocityY(speed);
            } else {
                let g = gasGroup.create(x, -50, 'gas').setScale(0.12);
                g.setVelocityY(speed);
            }
            speed += 2; // Aumento gradual de velocidad
        }

        function playSound(freq, type) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        function collectGas(p, g) {
            g.destroy();
            score += 10;
            scoreText.setText('GAS RECOLECTADO: ' + score);
            playSound(800, 'sine');
            if(score >= 200) winGame.call(this);
        }

        function hitObstacle(p, o) {
            o.destroy();
            lives--;
            livesText.setText('ESCUDOS: ' + lives);
            playSound(150, 'sawtooth');
            this.cameras.main.shake(100, 0.01);
            if(lives <= 0) gameOver.call(this);
        }

        function update() {
            if(isPlaying) {
                obstacles.children.iterate(child => { if(child && child.y > 1200) child.destroy(); });
                gasGroup.children.iterate(child => { if(child && child.y > 1200) child.destroy(); });
            }
        }

        function gameOver() {
            isPlaying = false;
            this.physics.pause();
            this.add.text(400, 600, 'DERROTA\nAPUESTA ENVIADA AL VAULT', { fontSize: '50px', fill: '#ff0000', align: 'center' }).setOrigin(0.5);
            document.getElementById('status').innerText = "TRANSFIRIENDO A " + VAULT_DEAD.substring(0,6);
            setTimeout(() => location.reload(), 5000);
        }

        function winGame() {
            isPlaying = false;
            this.physics.pause();
            this.add.text(400, 600, 'VICTORIA MAJESTUOSA\nRECLAMA TU ZAARD', { fontSize: '50px', fill: '#00ff00', align: 'center' }).setOrigin(0.5);
            setTimeout(() => location.reload(), 5000);
        }

        async function connectWallet() {
            if (window.ethereum) {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                document.getElementById('connectBtn').innerText = accounts[0].substring(0,6) + "...";
                document.getElementById('status').innerText = "BILLETERA VINCULADA";
            }
        }
    </script>
</body>
</html>
