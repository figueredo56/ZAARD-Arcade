<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD ARCADE - HUB</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
        
        /* Fondo principal */
        #fondo { 
            width: 100%; height: 100%; 
            background: url('https://ipfs.io/ipfs/bafybeibh72yyt44wdubhwzihjnagspobzprpmqi6kfi66a6b4di2rjurre') no-repeat center center; 
            background-size: cover;
        }

        /* Bienvenida */
        #bienvenida { 
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: url('https://ipfs.io/ipfs/bafybeibh72yyt44wdubhwzihjnagspobzprpmqi6kfi66a6b4di2rjurre') no-repeat center center;
            background-size: cover;
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999; 
        }
        .btn-entrar { padding: 20px 50px; border: 3px solid #ffd700; background: rgba(0,0,0,0.6); color: #fff; font-size: 1.5rem; cursor: pointer; border-radius: 10px; }

        /* Botones sobre la imagen */
        .btn-juego { position: absolute; width: 250px; height: 120px; background: rgba(255,255,255,0.05); cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
        
        /* Posiciones ajustadas para tu imagen */
        #btn-memoria { top: 32%; left: 10%; }
        #btn-lucky { top: 55%; left: 10%; }
        #btn-combat { top: 78%; left: 10%; }
        #btn-token { top: 45%; right: 10%; width: 150px; height: 150px; border-radius: 50%; }
        #btn-web { bottom: 5%; right: 5%; width: 150px; height: 60px; }
    </style>
</head>
<body>

    <div id="bienvenida">
        <button class="btn-entrar" onclick="document.getElementById('bienvenida').style.display='none'">ENTRAR A ZAARD</button>
    </div>

    <div id="fondo">
        <div id="btn-memoria" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-memoria.html'"></div>
        <div id="btn-lucky" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/index-lucky.html'"></div>
        <div id="btn-combat" class="btn-juego" onclick="window.location.href='https://figueredo56.github.io/ZAARD-Arcade/combat/'"></div>
        <div id="btn-token" class="btn-juego" onclick="window.open('https://app.binance.com/uni-qr/web3-token-details?tokenCA=0x3468ea4e6ce13ec4c7f8651f7efc6aa6046f4d65&binanceChainId=56&chain=bsc', '_blank')"></div>
        <div id="btn-web" class="btn-juego" onclick="window.open('https://figueredo56.github.io/zaard-official/', '_blank')"></div>
    </div>

</body>
</html>
