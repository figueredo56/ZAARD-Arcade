<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAARD GOLD RUN - Arcade</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <style>
        /* Efecto Cine: Fondo negro y centrado */
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: Arial, sans-serif;
        }

        /* Contenedor del juego con franjas negras */
        #game-container {
            width: 100%;
            max-width: 800px;
            height: 600px;
            border-top: 2px solid #f3ba2f;
            border-bottom: 2px solid #f3ba2f;
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.2);
            position: relative;
        }

        canvas {
            display: block;
        }
    </style>
</head>
<body>

<div id="game-container"></div>

<script>
    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 600,
        parent: 'game-container',
        physics: {
            default: 'arcade',
            arcade: { gravity: { y: 800 }, debug: false }
        },
        scene: {
            preload: preload,
            create: create,
            update: update
        }
    };

    const game = new Phaser.Game(config);
    let player;
    let cursors;
    let coins;
    let score = 0;
    let scoreText;
    let bgMusic;

    function preload() {
        // Carga de imágenes (asegúrate de tener estas rutas correctas en tu GitHub)
        this.load.image('sky', 'assets/fondo_zaard.png'); // Tu fondo personalizado
        this.load.image('ground', 'assets/platform.png');
        
        // Generamos un círculo blanco para las monedas dinámicamente si no tienes el asset
        let circle = this.make.graphics({x: 0, y: 0, add: false});
        circle.fillStyle(0xf3ba2f, 1);
        circle.fillCircle(15, 15, 15);
        circle.generateTexture('coin', 30, 30);

        // Personaje (usaremos un rectángulo si no hay asset, cámbialo por tu PNG)
        this.load.spritesheet('dude', 'assets/dude.png', { frameWidth: 32, frameHeight: 48 });

        // Música (Sustituye por tu link de audio)
        this.load.audio('gameTheme', 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3'); 
    }

    function create() {
        // Fondo centrado para dar efecto de profundidad
        let bg = this.add.image(400, 300, 'sky');
        bg.setDisplaySize(800, 600);
        bg.setAlpha(0.6); // Un poco oscuro para que resalten las monedas

        // Música con interacción de usuario
        bgMusic = this.sound.add('gameTheme', { loop: true, volume: 0.5 });
        this.input.on('pointerdown', () => {
            if (!bgMusic.isPlaying) bgMusic.play();
        });

        // Suelo invisible
        let platforms = this.physics.add.staticGroup();
        platforms.create(400, 580, 'ground').setScale(2).refreshBody().setAlpha(0);

        // Jugador
        player = this.physics.add.sprite(100, 450, 'dude');
        player.setBounce(0.1);
        player.setCollideWorldBounds(true);

        // Monedas redondas (Gas)
        coins = this.physics.add.group({
            key: 'coin',
            repeat: 5,
            setXY: { x: 300, y: 0, stepX: 120 }
        });

        coins.children.iterate(function (child) {
            child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
            child.setCircle(15); // Hace que la colisión sea redonda
        });

        // Colisiones
        this.physics.add.collider(player, platforms);
        this.physics.add.collider(coins, platforms);
        this.physics.add.overlap(player, coins, collectCoin, null, this);

        // UI
        scoreText = this.add.text(16, 16, 'ZAARD Pts: 0', { fontSize: '32px', fill: '#f3ba2f', fontStyle: 'bold' });
        cursors = this.input.keyboard.createCursorKeys();

        // Mensaje de inicio
        this.add.text(250, 20, 'Haz clic para activar SONIDO 🔊', { fontSize: '16px', fill: '#ffffff' });
    }

    function update() {
        if (cursors.left.isDown) {
            player.setVelocityX(-200);
        } else if (cursors.right.isDown) {
            player.setVelocityX(200);
        } else {
            player.setVelocityX(0);
        }

        if (cursors.up.isDown && player.body.touching.down) {
            player.setVelocityY(-500);
        }
    }

    function collectCoin(player, coin) {
        coin.disableBody(true, true);
        score += 10;
        scoreText.setText('ZAARD Pts: ' + score);

        // Respawn de monedas para que sea infinito
        if (coins.countActive(true) === 0) {
            coins.children.iterate(function (child) {
                child.enableBody(true, child.x, 0, true, true);
            });
        }
    }
</script>

</body>
</html>
