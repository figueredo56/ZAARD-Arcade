<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD GOLD RUN - PANGA EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #050515; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; padding: 10px; z-index: 10; }
        .btn-connect { padding: 8px 12px; background: rgba(0, 251, 255, 0.1); border: 1px solid #00fbff; color: #00fbff; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
    </style>
</head>
<body>

<div class="web3-panel">
    <div style="color: #00fbff; font-weight: bold; text-shadow: 0 0 5px #00fbff;">ZAARD INNOVATION</div>
    <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
</div>

<script>
    const BURNS_ADDRESS = "0x0000000000000000000000000000000000000000";
    const APUESTA = "0.0001";
    const OBJETIVO_GAS = 200;

    const config = {
        type: Phaser.AUTO,
        width: 800,
        height: 1250,
        backgroundColor: '#050515',
        scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
        physics: { default: 'arcade', arcade: { debug: false } },
        scene: { preload: preload, create: create, update: update }
    };

    const game = new Phaser.Game(config);
    let player, obstacles, gasGroup, cursors;
    let score = 0, lives = 5, gameSpeed = 450, isPlaying = false;
    let scoreText, livesText;

    function preload() {
        const gw = "https://cloudflare-ipfs.com/ipfs/";
        this.load.image('fondo', gw + 'bafybeibdx3yzp4tc2ju26o4eht5si4tdy3kpgqf3z5j2e4he5si4tdy3kpg');
        this.load.image('player', gw + 'bafybeid4eh5si4tdy3kpqgtnd4l2z6ehac3rkd4vjmsgdb5gqbs2vcox34');
        this.load.image('obs', gw + 'bafybeiarw4qbftgyh2rzjyw56s4cpjxtlptxtwgasgnu7rovqkvmpjgbgy');
        this.load.image('gas', gw + 'bafybeihsmtiwinw5w6jcebelg2p6kr64ivuijcmx4dnpuny2m22piqin2y');
        
        // Sonidos (Usando los de Phaser Labs que son estables)
        this.load.audio('collect', 'https://labs.phaser.io/assets/audio/SoundEffects/p-ping.mp3');
        this.load.audio('crash', 'https://labs.phaser.io/assets/audio/SoundEffects/explosion.mp3');
        this.load.audio('winSound', 'https://labs.phaser.io/assets/audio/SoundEffects/key.wav');
    }

    function create() {
        this.add.image(400, 625, 'fondo').setDisplaySize(800, 1250).setAlpha(0.3);
        mostrarBienvenida.call(this);
    }

    function mostrarBienvenida() {
        let overlay = this.add.graphics().fillStyle(0x000000, 0.85).fillRect(0, 0, 800, 1250);
        
        let welcomeTxt = this.add.text(400, 300, 'BIENVENIDO A ZAARD\n"LA FUERZA PANGA"', {
            fontSize: '55px', fill: '#00fbff', align: 'center', fontWeight: 'bold', stroke: '#000', strokeThickness: 5
        }).setOrigin(0.5);

        let infoTxt = this.add.text(400, 550, 
            'Domina la energía del ecosistema.\n\n' +
            '• RECOLECTA: 200 de GAS para ganar.\n' +
            '• EVITA: Los obstáculos del vacío.\n' +
            '• FUERZA PANGA: Tienes 5 vidas.\n\n' +
            'Apuesta: 0.0001 ZAARD.2\n' +
            'Si fallas, tu energía se quema.', {
            fontSize: '28px', fill: '#ffffff', align: 'center', lineSpacing: 10
        }).setOrigin(0.5);

        let btnStart = this.add.rectangle(400, 900, 450, 90, 0x00fbff, 0.2).setInteractive();
        let txtStart = this.add.text(400, 900, 'ACTIVAR FUERZA PANGA', { fontSize: '32px', fill: '#00fbff', fontWeight: 'bold' }).setOrigin(0.5);

        btnStart.on('pointerdown', () => {
            overlay.destroy(); welcomeTxt.destroy(); infoTxt.destroy(); btnStart.destroy(); txtStart.destroy();
            iniciarJuego.call(this);
        });

        this.tweens.add({ targets: txtStart, alpha: 0.5, duration: 800, yoyo: true, loop: -1 });
    }

    function iniciarJuego() {
        isPlaying = true;
        score = 0; lives = 5; gameSpeed = 450;

        player = this.physics.add.sprite(400, 1050, 'player').setScale(0.25).setCollideWorldBounds(true);
        obstacles = this.physics.add.group();
        gasGroup = this.physics.add.group();

        scoreText = this.add.text(20, 80, 'GAS: 0 / 200', { fontSize: '35px', fill: '#00fbff', fontWeight: 'bold' });
        livesText = this.add.text(20, 130, 'VIDAS: 5', { fontSize: '35px', fill: '#ff4444', fontWeight: 'bold' });

        this.time.addEvent({ delay: 1000, callback: spawnObstacle, callbackScope: this, loop: true });
        this.time.addEvent({ delay: 800, callback: spawnGas, callbackScope: this, loop: true });

        this.physics.add.overlap(player, obstacles, hitObstacle, null, this);
        this.physics.add.overlap(player, gasGroup, collectGas, null, this);

        this.input.on('pointermove', (pointer) => { if(isPlaying) player.x = pointer.x; });
    }

    function spawnObstacle() {
        if (!isPlaying) return;
        let obs = obstacles.create(Phaser.Math.Between(50, 750), -50, 'obs').setScale(0.18);
        obs.setVelocityY(gameSpeed);
    }

    function spawnGas() {
        if (!isPlaying) return;
        let gas = gasGroup.create(Phaser.Math.Between(50, 750), -50, 'gas').setScale(0.15);
        gas.setVelocityY(gameSpeed);
    }

    function hitObstacle(player, obstacle) {
        obstacle.destroy();
        this.sound.play('crash', { volume: 0.5 });
        lives--;
        livesText.setText('VIDAS: ' + lives);
        this.cameras.main.shake(150, 0.01);
        if (lives <= 0) finalizarJuego.call(this, false);
    }

    function collectGas(player, gas) {
        gas.destroy();
        this.sound.play('collect', { volume: 0.4 });
        score++;
        scoreText.setText('GAS: ' + score + ' / 200');
        gameSpeed += 3; 
        if (score >= OBJETIVO_GAS) finalizarJuego.call(this, true);
    }

    function update() {}

    function finalizarJuego(win) {
        isPlaying = false;
        this.physics.pause();
        if(win) this.sound.play('winSound');

        let msg = win ? "¡VICTORIA MAJESTUOSA!\nRECOMPENSA ENVIADA" : "ENERGÍA AGOTADA\nZAARD ENVIADO A LA QUEMA";
        let color = win ? "#00fbff" : "#ff4444";

        this.add.rectangle(400, 625, 800, 1250, 0x000000, 0.9);
        this.add.text(400, 600, msg, { fontSize: '42px', fill: color, align: 'center', fontWeight: 'bold' }).setOrigin(0.5);
        
        setTimeout(() => { location.reload(); }, 5000);
    }

    async function connectWallet() {
        if (window.ethereum) {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connectBtn').innerText = accounts[0].substring(0, 6) + '...';
        }
    }
</script>
</body>
</html>
