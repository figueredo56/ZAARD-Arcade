<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>ZAARD GOLD RUN - Web3</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background-color: #050515; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        .web3-panel { position: fixed; top: 10px; width: 95%; display: flex; justify-content: space-between; padding: 10px; z-index: 100; }
        .btn-connect { padding: 8px 12px; background: rgba(0, 251, 255, 0.1); border: 1px solid #00fbff; color: #00fbff; border-radius: 5px; font-size: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="web3-panel">
        <div style="color: #00fbff; font-weight: bold; text-shadow: 0 0 5px #00fbff;">ZAARD GOLD RUN</div>
        <button id="connectBtn" class="btn-connect" onclick="connectWallet()">CONECTAR WALLET</button>
    </div>

    <script>
        const config = {
            type: Phaser.AUTO,
            width: 800, height: 1250,
            physics: { default: 'arcade', arcade: { gravity: { y: 0 }, debug: false } },
            scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, obstacles, coins, cursors, score = 0, lives = 7, isPlaying = false;
        let bg, speed = 5;

        function preload() {
            this.load.image('fondo', 'https://ipfs.io/ipfs/bafkreifeqxh3foulnfp2fjdof2qmfgznpsbpphrfogltth5hs6e2uyiqya');
            this.load.image('player', 'https://ipfs.io/ipfs/bafybeiaaz2ebmyfezamhs3x7jqz5yujnhbru4v6cufyurjokddsb6bjxbu'); // Usando el Fénix como avatar
            this.load.image('coin', 'https://ipfs.io/ipfs/bafybeihehm24qpw57c23mjjomwwka4hngagf34zmkwvfedskn6ze7vf7e4');
            this.load.image('obs', 'https://ipfs.io/ipfs/bafybeihwgutss2majkvanadmm4rwbp6kpcgywebs3cgpgwdcs45ut3srd4');
        }

        function create() {
            bg = this.add.tileSprite(400, 625, 800, 1250, 'fondo').setAlpha(0.3);
            mostrarMenu.call(this);
        }

        function mostrarMenu() {
            this.children.removeAll();
            isPlaying = false;
            
            this.add.text(400, 400, 'ZAARD GOLD RUN\nEL DESAFÍO DE VELOCIDAD', { 
                fontSize: '45px', fill: '#00fbff', align: 'center', fontWeight: 'bold' 
            }).setOrigin(0.5);

            this.add.text(400, 580, 'Esquiva los obstáculos y recolecta ZAARD.\nSi chocas 7 veces, pierdes la apuesta.\n¿Tienes los reflejos necesarios?', { 
                fontSize: '24px', fill: '#ffffff', align: 'center' 
            }).setOrigin(0.5);

            let btnStart = this.add.text(400, 800, '[ APOSTAR Y CORRER ]', { 
                fontSize: '35px', fill: '#00fbff', fontWeight: 'bold' 
            }).setOrigin(0.5).setInteractive();

            btnStart.on('pointerdown', () => iniciarJuego.call(this));
        }

        function iniciarJuego() {
            this.children.removeAll();
            score = 0; lives = 7; speed = 7; isPlaying = true;

            player = this.physics.add.sprite(400, 1000, 'player').setScale(0.3).setCollideWorldBounds(true);
            obstacles = this.physics.add.group();
            coins = this.physics.add.group();

            scoreText = this.add.text(20, 80, 'ZAARD: 0', { fontSize: '32px', fill: '#00fbff' });
            livesText = this.add.text(20, 130, 'VIDAS: 7', { fontSize: '32px', fill: '#ff4444' });

            // Generador de objetos
            this.time.addEvent({ delay: 1200, callback: spawnObstacle, callbackScope: this, loop: true });
            this.time.addEvent({ delay: 2000, callback: spawnCoin, callbackScope: this, loop: true });

            this.physics.add.overlap(player, coins, collectCoin, null, this);
            this.physics.add.overlap(player, obstacles, hitObstacle, null, this);

            // Control táctico
            this.input.on('pointermove', (pointer) => {
                if(isPlaying) player.x = pointer.x;
            });
        }

        function update() {
            if (isPlaying) {
                bg.tilePositionY -= speed;
                obstacles.children.iterate(obs => { if(obs && obs.y > 1300) obs.destroy(); });
                coins.children.iterate(c => { if(c && c.y > 1300) c.destroy(); });
            }
        }

        function spawnObstacle() {
            if(!isPlaying) return;
            let x = Phaser.Math.Between(100, 700);
            let obs = obstacles.create(x, -50, 'obs').setScale(0.2);
            obs.setVelocityY(speed * 60);
        }

        function spawnCoin() {
            if(!isPlaying) return;
            let x = Phaser.Math.Between(100, 700);
            let coin = coins.create(x, -50, 'coin').setScale(0.15);
            coin.setVelocityY(speed * 50);
        }

        function collectCoin(player, coin) {
            coin.destroy();
            score += 10;
            scoreText.setText('ZAARD: ' + score);
            if(score % 100 === 0) speed += 0.5; // Aumenta dificultad
        }

        function hitObstacle(player, obs) {
            obs.destroy();
            lives--;
            livesText.setText('VIDAS: ' + lives);
            this.cameras.main.shake(200, 0.01);
            
            if (lives <= 0) {
                isPlaying = false;
                terminarJuego.call(this, "DERROTA\nEL VAULT SE QUEDA EL ZAARD");
            }
        }

        function terminarJuego(msg) {
            this.physics.pause();
            this.add.text(400, 600, msg, { 
                fontSize: '50px', fill: '#ff4444', align: 'center', fontWeight: 'bold' 
            }).setOrigin(0.5);

            setTimeout(() => mostrarMenu.call(this), 4000);
        }

        async function connectWallet() {
            if (window.ethereum) {
                try {
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    document.getElementById('connectBtn').innerText = accounts[0].substring(0,6) + '...';
                } catch (err) { console.error(err); }
            } else { alert("Abre esto en el navegador de MetaMask"); }
        }
    </script>
</body>
</html>
