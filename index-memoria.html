<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD Memory Challenge</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #game-container { border: 4px solid #34c1ea; box-shadow: 0 0 30px #34c1ea; }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <script>
        // Tus CIDs convertidos a URLs de IPFS
        const cids = [
            "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a",
            "bafkreic6hmavutykpcpviuxv4pq3xkgcquznb5j4zw7zbsrmwp5jnhylcy",
            "bafkreigufyxj7u4z7dgdkkghqbwyykmbtzp4ysxa7vau5a7at4bix4qmca",
            "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli",
            "bafkreia3b625wibxbftpcbdjqwqjnuthccdr2nrl6t3oflfne7w4dcqmaq",
            "bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4",
            "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue",
            "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq",
            "bafkreihtzxh5dazi4c3vueo5glxbycstfdesswsus73c4uwah5xwunyowa",
            "bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm"
        ];

        const config = {
            type: Phaser.AUTO, width: 800, height: 800, parent: 'game-container',
            scene: {
                preload: function() {
                    cids.forEach((cid, index) => this.load.image('carta'+index, 'https://ipfs.io/ipfs/' + cid));
                    this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                },
                create: function() {
                    this.intentos = 3;
                    this.txtIntentos = this.add.text(20, 20, 'Intentos: ' + this.intentos, { fontSize: '32px', fill: '#34c1ea' });
                    
                    // Lógica del tablero 6x6 (36 cartas, 18 pares)
                    let cartas = [];
                    for(let i=0; i<18; i++) { cartas.push(i%10, i%10); } // Mezcla tus 10 CIDs
                    Phaser.Utils.Array.Shuffle(cartas);

                    cartas.forEach((cidIdx, i) => {
                        let x = 80 + (i % 6) * 120;
                        let y = 100 + Math.floor(i / 6) * 120;
                        let card = this.add.image(x, y, 'dorso').setScale(0.2).setInteractive();
                        card.cid = 'carta' + cidIdx;
                        card.on('pointerdown', () => {
                            card.setTexture(card.cid);
                            // Aquí iría la lógica de comparación de pares
                            // Si falla par: this.intentos--; this.txtIntentos.setText('Intentos: ' + this.intentos);
                        });
                    });
                }
            }
        };
        new Phaser.Game(config);
    </script>
</body>
</html>
