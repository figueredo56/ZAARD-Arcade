<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD MEMORY ARCADE</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .ui-panel { position: absolute; width: 90%; max-width: 400px; left: 50%; top: 50%; transform: translate(-50%, -50%); background: #000; border: 2px solid #5a2d82; border-radius: 20px; padding: 20px; text-align: center; box-shadow: 0 0 20px #5a2d82; z-index: 100; }
        .banner { width: 100%; height: 200px; background-size: cover; background-position: center; border-radius: 10px; margin-bottom: 15px; }
        button { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 10px; background: linear-gradient(90deg, #5a2d82, #2ecc71); color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="ui-container">
    <div id="pantalla-inicio" class="ui-panel">
        <div class="banner" style="background-image: url('https://ipfs.io/ipfs/bafybeiefhnawny7nlgixveiia7aaougqxsird6or4nws52vp36ndbfvixa')"></div>
        <h2 style="color: #bc8fef;">ZAARD ARCADE</h2>
        <p>Sincronizando sistemas táctiles...</p>
        <button onclick="document.getElementById('pantalla-inicio').style.display='none'; document.getElementById('menu-seleccion').style.display='block';">¡ENTRAR AL JUEGO!</button>
    </div>

    <div id="menu-seleccion" class="ui-panel" style="display:none;">
        <div class="banner" style="background-image: url('https://ipfs.io/ipfs/bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm')"></div>
        <h2 style="color: #bc8fef;">MEMORY RUN</h2>
        <button onclick="lanzarJuego(false)">MODO INVITADO</button>
        <button onclick="lanzarJuego(true)">CONECTAR BILLETERA</button>
    </div>
</div>

<script>
    const cids = [
        "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a",
        "bafkreic6hmavutykpcpviuxv4pq3xkgcquznb5j4zw7zbsrmwp5jnhylcy",
        "bafkreigufyxj7u4z7dgdkkghqbwyykmbtzp4ysxa7vau5a7at4bix4qmca",
        "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli",
        "bafkreia3b625wibxbftpcbdjqwqjnuthccdr2nrl6t3oflfne7w4dcqmaq",
        "bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4",
        "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue",
        "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq",
        "bafkreihtzxh5dazi4c3vueo5glxbycstfdesswsus73c4uwah5xwunyowa",
        "bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm"
    ];

    function lanzarJuego(esWeb3) {
        document.getElementById('ui-container').style.display = 'none';
        new Phaser.Game({
            type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight,
            scene: {
                preload: function() {
                    cids.forEach((c, i) => this.load.image('c'+i, 'https://ipfs.io/ipfs/'+c));
                    this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                },
                create: function() {
                    this.add.rectangle(window.innerWidth/2, window.innerHeight/2, window.innerWidth, window.innerHeight, 0x020006);
                    this.vidas = 6;
                    this.txt = this.add.text(20, 20, 'Oportunidades: 6', { fontSize: '24px', color: '#bc8fef' });
                    
                    let deck = []; for(let i=0; i<18; i++) { deck.push(i%10, i%10); }
                    Phaser.Utils.Array.Shuffle(deck);

                    deck.forEach((id, i) => {
                        // Cuadrícula 6x6 ajustada
                        let card = this.add.sprite(70 + (i%6)*95, 150 + Math.floor(i/6)*95, 'dorso').setScale(0.13).setInteractive();
                        card.cid = 'c'+id;
                        card.on('pointerdown', () => {
                            if(this.lock || card.texture.key !== 'dorso') return;
                            card.setTexture(card.cid);
                            if(!this.p1) this.p1 = card;
                            else {
                                this.lock = true;
                                if(this.p1.cid !== card.cid) {
                                    setTimeout(() => {
                                        this.p1.setTexture('dorso'); card.setTexture('dorso');
                                        this.p1 = null; this.lock = false;
                                        this.vidas--; this.txt.setText('Oportunidades: ' + this.vidas);
                                        if(this.vidas <= 0) location.reload();
                                    }, 800);
                                } else { this.p1 = null; this.lock = false; }
                            }
                        });
                    });
                }
            }
        });
    }
</script>
</body>
</html>
