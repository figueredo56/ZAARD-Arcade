<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZAARD Memory 7x7</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <style>
        body { margin: 0; background: #020006; color: white; font-family: 'Orbitron', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #menu-bienvenida { position: absolute; z-index: 20; background: rgba(0,0,0,0.95); padding: 40px; border: 2px solid #34c1ea; border-radius: 20px; text-align: center; width: 80%; max-width: 500px; }
        button { margin: 15px; padding: 15px 30px; font-size: 18px; cursor: pointer; background: linear-gradient(135deg, #34c1ea, #16a34a); border: none; color: white; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="menu-bienvenida">
        <h1>BIENVENIDO A ZAARD</h1>
        <p>Prueba tu memoria y gana Tokens de nuestro ecosistema.</p>
        <button onclick="iniciarJuego(false)">Jugar Invitado</button>
        <button onclick="iniciarJuego(true)">Apostar (Web3)</button>
    </div>

    <div id="game-container"></div>

    <script>
        const cids = [
            "bafybeihg4evetf2c5fqeozxttct7mone4jaequysqrxndlx4wqmf2zn45a",
            "bafkreic6hmavutykpcpviuxv4pq3xkgcquznb5j4zw7zbsrmwp5jnhylcy",
            "bafkreigufyxj7u4z7dgdkkghqbwyykmbtzp4ysxa7vau5a7at4bix4qmca",
            "bafkreicdxf34fpb4t5yx6p4ijurnspvv47rgu373nl5yeyzj57s3ignoli",
            "bafkreia3b625wibxbftpcbdjqwqjnuthccdr2nrl6t3oflfne7w4dcqmaq",
            "bafybeicsg3uv7e3gcl7h7ibq5io5frmrpcbvkg24igufpyek26pzqmrrr4",
            "bafybeihqftstfjm3i32e3xm54xo52h6tpldlmfkwc2z6tx5qthbonyboue",
            "bafkreicd3i7jagmv5iig5t3nttdqpwmv6xa2e3ahyvtzh7vy2hdglbfvsq",
            "bafkreihtzxh5dazi4c3vueo5glxbycstfdesswsus73c4uwah5xwunyowa",
            "bafybeic5377igwloc2o63whivoykazkibjruq7bau4edjpfdfu4gudunjm"
        ];

        function iniciarJuego(esWeb3) {
            document.getElementById('menu-bienvenida').style.display = 'none';
            
            new Phaser.Game({
                type: Phaser.AUTO, width: 850, height: 950, parent: 'game-container',
                scene: {
                    preload: function() {
                        cids.forEach((cid, i) => this.load.image('c'+i, 'https://ipfs.io/ipfs/' + cid));
                        this.load.image('dorso', 'https://ipfs.io/ipfs/bafybeibmhheisrjxpxpcsh6goj6c4pxraz5xkcizn4aiyl5eamdc5qyc3m');
                    },
                    create: function() {
                        this.intentos = 3;
                        this.add.rectangle(425, 50, 220, 60, 0x000000).setStrokeStyle(3, 0x34c1ea);
                        this.txtIntentos = this.add.text(340, 35, 'Vidas: 3', { fontSize: '28px', fill: '#ff0000', fontFamily: 'Orbitron' });
                        
                        let deck = [];
                        for(let i=0; i<24; i++) { deck.push(i%10, i%10); } 
                        Phaser.Utils.Array.Shuffle(deck);

                        deck.forEach((id, i) => {
                            let card = this.add.sprite(75 + (i % 7) * 115, 150 + Math.floor(i / 7) * 115, 'dorso').setScale(0.18).setInteractive();
                            card.cid = 'c' + id;
                            card.on('pointerdown', () => {
                                if (this.bloqueado || card.texture.key !== 'dorso') return;
                                card.setTexture(card.cid);
                                if (!this.primera) { this.primera = card; } 
                                else {
                                    this.bloqueado = true;
                                    if (this.primera.cid === card.cid) { this.primera = null; this.bloqueado = false; }
                                    else {
                                        setTimeout(() => {
                                            this.primera.setTexture('dorso'); card.setTexture('dorso');
                                            this.primera = null; this.bloqueado = false;
                                            this.intentos--;
                                            this.txtIntentos.setText('Vidas: ' + this.intentos);
                                            if (this.intentos === 0) { alert("¡Perdiste! Fin del juego."); location.reload(); }
                                        }, 1000);
                                    }
                                }
                            });
                        });
                    }
                }
            });
        }
    </script>
</body>
</html>
